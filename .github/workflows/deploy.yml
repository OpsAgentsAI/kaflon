name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  WIF_PROVIDER: projects/523955774086/locations/global/workloadIdentityPools/github-actions-pool/providers/github-oidc
  WIF_SA: gha-deployer@opsagent-prod.iam.gserviceaccount.com
  FIREBASE_PROJECT: opsagent-prod
  HOSTING_TARGET: kaflon

jobs:
  deploy_live:
    name: Deploy live (kaflon.web.app)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-live
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest

      - name: Deploy to Firebase Hosting (live)
        run: |
          firebase deploy \
            --only "hosting:${HOSTING_TARGET}" \
            --project "${FIREBASE_PROJECT}" \
            --non-interactive \
            --force

      - name: Refresh kid-qa preview channel (30d TTL)
        run: |
          firebase hosting:channel:deploy kid-qa \
            --only "${HOSTING_TARGET}" \
            --project "${FIREBASE_PROJECT}" \
            --expires 30d \
            --non-interactive \
            --json > kid-qa-output.json || true
          if [ -f kid-qa-output.json ]; then
            URL=$(jq -r '.result["'${HOSTING_TARGET}'"].url // empty' kid-qa-output.json)
            echo "kid-qa channel URL: ${URL:-<deploy failed; see logs>}"
          fi

  deploy_preview:
    name: Deploy preview channel (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest

      - name: Deploy to preview channel
        id: preview
        run: |
          CHANNEL="preview-${{ github.event.pull_request.number }}"
          firebase hosting:channel:deploy "${CHANNEL}" \
            --only "${HOSTING_TARGET}" \
            --project "${FIREBASE_PROJECT}" \
            --expires 7d \
            --non-interactive \
            --json > preview-output.json
          URL=$(jq -r '.result["'${HOSTING_TARGET}'"].url' preview-output.json)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const body = `🚀 **Preview deploy** — ${url}\n\n7 day TTL. Sandboxed channel ${`preview-${context.issue.number}`}.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
