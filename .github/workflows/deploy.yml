name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-hosting-kaflon-live
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPSAGENT_PROD }}
          channelId: live
          projectId: opsagent-prod
          target: kaflon
