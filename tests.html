<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaflon Tests</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; line-height: 1.5; }
    h1 { margin: 0 0 8px; }
    h2 { margin: 16px 0 8px; }
    .pass { color: #16a34a; }
    .fail { color: #dc2626; }
    .summary-pass { background: #f0fdf4; border: 2px solid #16a34a; padding: 12px 16px; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
    .summary-fail { background: #fef2f2; border: 2px solid #dc2626; padding: 12px 16px; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
    .case { padding: 4px 0; font-family: ui-monospace, Menlo, monospace; font-size: 0.95em; }
    iframe { display: none; }
    .hint { color: #64748b; font-size: 0.9em; }
  </style>
</head>
<body>

  <h1>Kaflon test suite</h1>
  <p class="hint">
    Pure-browser tests for the math generators in <code>index.html</code>. No
    npm install needed &mdash; just open this file in a browser, or hit it from CI.
    Tests load <code>index.html</code> in a hidden iframe and assert against
    <code>window.__kaflon</code>.
  </p>

  <div id="summary"></div>
  <div id="log"></div>

  <iframe id="app" src="index.html"></iframe>

  <script>
    const log = document.getElementById('log');
    const summary = document.getElementById('summary');
    const results = [];

    function record(name, ok, msg) {
      results.push({ name, ok, msg });
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.textContent = (ok ? '✓ ' : '✗ ') + name + (msg ? ' — ' + msg : '');
      log.appendChild(div);
    }

    function test(name, fn) {
      try {
        fn();
        record(name, true);
      } catch (e) {
        record(name, false, e.message);
      }
    }

    function assert(cond, msg) {
      if (!cond) throw new Error(msg || 'assertion failed');
    }

    function runTests() {
      const K = document.getElementById('app').contentWindow.__kaflon;
      if (!K) {
        record('window.__kaflon is exposed by index.html', false, 'iframe loaded but __kaflon is undefined');
        finish();
        return;
      }
      record('window.__kaflon is exposed by index.html', true);

      // ------ genPlaceValue ------
      test('genPlaceValue returns 3-decimal-place number', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.placeValue();
          assert(/^\d\.\d\d\d$/.test(q.questionText), 'bad format: ' + q.questionText);
        }
      });

      test('genPlaceValue answer is integer in 0..9', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.placeValue();
          assert(Number.isInteger(q.answer), 'non-integer: ' + q.answer);
          assert(q.answer >= 0 && q.answer <= 9, 'out of range: ' + q.answer);
        }
      });

      test('genPlaceValue answer matches the digit at the named place', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.placeValue();
          const digits = q.questionText.replace('.', '');
          // digits are: ones, tenths, hundredths, thousandths
          assert(digits.length === 4, 'expected 4 digits: ' + digits);
          assert(digits.includes(String(q.answer)), 'answer ' + q.answer + ' not in ' + q.questionText);
        }
      });

      test('genPlaceValue carries kind + placeKey for lang-agnostic rebuild', () => {
        for (let i = 0; i < 20; i++) {
          const q = K.gen.placeValue();
          assert(q.kind === 'place-value', 'bad kind: ' + q.kind);
          assert(['tenths', 'hundredths', 'thousandths'].includes(q.placeKey),
            'bad placeKey: ' + q.placeKey);
          assert(q.num && q.num.length === 5, 'bad num: ' + q.num);
        }
      });

      // ------ genUnitConv ------
      test('genUnitConv denominator is one of 10, 100, 1000', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.unitConv();
          const m = q.questionText.match(/\/(\d+)$/);
          assert(m, 'no denom in: ' + q.questionText);
          assert([10, 100, 1000].includes(parseInt(m[1], 10)), 'bad denom: ' + m[1]);
        }
      });

      test('genUnitConv answer is integer in 1..denom-1', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.unitConv();
          const denom = parseInt(q.questionText.match(/\/(\d+)$/)[1], 10);
          assert(Number.isInteger(q.answer), 'non-integer: ' + q.answer);
          assert(q.answer >= 1 && q.answer < denom, 'out of range: ' + q.answer + ' for denom ' + denom);
        }
      });

      test('genUnitConv decimal value * denominator equals the answer', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.unitConv();
          const m = q.questionText.match(/^([\d.]+)\s*=\s*\?\/(\d+)$/);
          assert(m, 'bad format: ' + q.questionText);
          const value = parseFloat(m[1]);
          const denom = parseInt(m[2], 10);
          // Use rounding to absorb float drift (e.g. 0.07 * 100 = 7.000000000000001)
          assert(Math.round(value * denom) === q.answer,
            q.questionText + ': value*denom=' + (value * denom) + ' but answer=' + q.answer);
        }
      });

      // ------ genCompare ------
      test('genCompare answer is in {-1, 0, 1}', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.compare();
          assert([-1, 0, 1].includes(q.answer), 'bad answer: ' + q.answer);
        }
      });

      test('genCompare answer matches numeric comparison of the two operands', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.compare();
          const m = q.questionText.match(/^([\d.]+)\s*☐\s*([\d.]+)$/);
          assert(m, 'bad format: ' + q.questionText);
          const a = parseFloat(m[1]);
          const b = parseFloat(m[2]);
          const expected = a < b ? -1 : a > b ? 1 : 0;
          assert(q.answer === expected,
            q.questionText + ': generator says ' + q.answer + ', math says ' + expected);
        }
      });

      test('genCompare produces equal-value trap pairs (0.4 vs 0.40) regularly', () => {
        let equalCount = 0;
        for (let i = 0; i < 400; i++) {
          if (K.gen.compare().answer === 0) equalCount++;
        }
        // 4 styles, 1 of which always produces equal → expect ~25% with some variance
        assert(equalCount >= 40, 'equal cases too rare: ' + equalCount + '/400 — trap pairs may be broken');
      });

      test('genCompare leading-zero-trap style is well-formed', () => {
        // 0.07 vs 0.7 — sample enough that we hit this style
        let leadingTrapSeen = 0;
        for (let i = 0; i < 800; i++) {
          const q = K.gen.compare();
          if (/0\.0\d ☐ 0\.\d$/.test(q.questionText) || /0\.\d ☐ 0\.0\d$/.test(q.questionText)) {
            leadingTrapSeen++;
            // For this style the answer is never 0 (0.07 ≠ 0.7)
            assert(q.answer !== 0, 'leading-zero pair claimed equal: ' + q.questionText);
          }
        }
        assert(leadingTrapSeen >= 40, 'leading-zero trap too rare: ' + leadingTrapSeen + '/800');
      });

      // ------ rand ------
      test('rand(min, max) stays within bounds', () => {
        for (let i = 0; i < 500; i++) {
          const r = K.rand(3, 7);
          assert(Number.isInteger(r) && r >= 3 && r <= 7, 'out of bounds: ' + r);
        }
      });

      test('rand(min, max) hits both endpoints over enough samples', () => {
        const seen = new Set();
        for (let i = 0; i < 1000; i++) seen.add(K.rand(0, 4));
        assert(seen.has(0) && seen.has(4), 'endpoints never sampled: ' + [...seen]);
      });

      // ------ DECIMAL_MODULES ------
      test('DECIMAL_MODULES has at least 10 curriculum entries', () => {
        assert(Array.isArray(K.DECIMAL_MODULES), 'not an array');
        assert(K.DECIMAL_MODULES.length >= 10, 'too few modules: ' + K.DECIMAL_MODULES.length);
      });

      test('DECIMAL_MODULES first two entries (P1.1, compare) have enter() functions', () => {
        const p11 = K.DECIMAL_MODULES.find(m => m.key === 'p1-1');
        const cmp = K.DECIMAL_MODULES.find(m => m.key === 'compare');
        assert(p11 && typeof p11.enter === 'function', 'p1-1 missing enter()');
        assert(cmp && typeof cmp.enter === 'function', 'compare missing enter()');
      });

      test('DECIMAL_MODULES all entries have enter() functions (v0.5+v0.6 sprint)', () => {
        // After the v0.5/v0.6 Ayala sprint, every curriculum entry should be
        // a live drill — no more "coming soon" stubs in the menu.
        const inactive = K.DECIMAL_MODULES.filter(m => typeof m.enter !== 'function');
        assert(inactive.length === 0, 'inactive modules: ' + inactive.map(m => m.key).join(','));
      });

      // ------ genMeasurements (P2.3) ------
      test('genMeasurements produces a from-unit, to-unit question with a numeric answer', () => {
        for (let i = 0; i < 100; i++) {
          const q = K.gen.measurements();
          assert(q.kind === 'measurements', 'wrong kind: ' + q.kind);
          assert(typeof q.answer === 'number' && isFinite(q.answer) && q.answer > 0,
                 'bad answer: ' + q.answer);
          assert(['m', 'cm', 'mm'].includes(q.fromKey) && ['m', 'cm', 'mm'].includes(q.toKey),
            'bad fromKey/toKey: ' + q.fromKey + '/' + q.toKey);
          const en = K.formatQuestion(q, 'en').questionText;
          assert(/= \? /.test(en), 'malformed prompt: ' + en);
        }
      });

      // ------ genPercentWhole (P3.1) ------
      test('genPercentWhole answer is ALWAYS a whole number', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.percentWhole();
          assert(q.kind === 'percent-whole', 'wrong kind: ' + q.kind);
          assert(Number.isInteger(q.answer),
                 'answer is not integer: ' + q.answer + ' from p=' + q.p + ' base=' + q.base);
        }
      });

      test('genPercentWhole uses the {10, 20, 25, 50, 75, 100} percent bucket', () => {
        const seen = new Set();
        for (let i = 0; i < 500; i++) {
          const q = K.gen.percentWhole();
          seen.add(q.p);
        }
        const allowed = new Set([10, 20, 25, 50, 75, 100]);
        for (const p of seen) {
          assert(allowed.has(p), 'unexpected percent value: ' + p);
        }
        // expect at least 5 of the 6 over 500 samples
        assert(seen.size >= 5, 'too few percent values seen: ' + [...seen]);
      });

      // ------ genPercentDecimal (P3.2) ------
      test('genPercentDecimal answer is ≤ 2dp', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.percentDecimal();
          assert(q.kind === 'percent-decimal', 'wrong kind: ' + q.kind);
          // 2dp tolerance: answer * 100 must be an integer (within float noise)
          const scaled = Math.round(q.answer * 100);
          assert(Math.abs(scaled - q.answer * 100) < 1e-9,
                 'answer not ≤2dp: ' + q.answer);
          assert(typeof q.p === 'number' && typeof q.baseStr === 'string',
            'missing rebuild params p/baseStr');
        }
      });

      // ------ genMulDec (P3.3) ------
      test('genMulDec answer equals a × b within float tolerance', () => {
        // dState.submode defaults to "place-value" at module load, so this
        // call yields tier-1 (1dp × 1dp). Cover the contract: answer must
        // match the product of the operands displayed in questionText.
        for (let i = 0; i < 100; i++) {
          const q = K.gen.mulDec();
          assert(q.kind === 'mul-dec', 'wrong kind: ' + q.kind);
          const m = q.questionText.match(/^(\d+\.\d+) × (\d+\.\d+) = \?$/);
          assert(m, 'malformed prompt: ' + q.questionText);
          const a = parseFloat(m[1]);
          const b = parseFloat(m[2]);
          assert(Math.abs(q.answer - a * b) < 0.0001,
                 `answer mismatch: ${q.answer} vs ${a}*${b}=${a*b}`);
        }
      });

      test('genMulDec total decimal places of answer ≤ aDp + bDp (place-value rule)', () => {
        // The whole point of P3.3 BOSS: kids must learn that 0.3 × 0.2 = 0.06,
        // not 0.6. The total digits after the dot in the answer ≤ aDp + bDp.
        for (let i = 0; i < 100; i++) {
          const q = K.gen.mulDec();
          const ansStr = q.answer.toString();
          const dotIdx = ansStr.indexOf('.');
          const ansDp = dotIdx === -1 ? 0 : ansStr.length - dotIdx - 1;
          assert(ansDp <= q.aDp + q.bDp,
                 `place-value rule violated: ${ansStr} has ${ansDp} dp; aDp+bDp=${q.aDp+q.bDp}`);
        }
      });

      // ------ genMulDec "free" / "ללא הגבלה" mode ------
      // Ayala's unlimited boss mode: factors are ≥1, each independently 1–3 dp.
      // Answer arithmetic is still exact; place-value rule still holds.
      test('genMulDec free mode picks 1–3 dp per factor and integer part ≥ 1', () => {
        const prev = K.dState.submode;
        K.dState.submode = 'mul-dec-free';
        try {
          let sawDp1 = false, sawDp2 = false, sawDp3 = false;
          for (let i = 0; i < 400; i++) {
            const q = K.gen.mulDec();
            assert(q.aDp >= 1 && q.aDp <= 3, 'aDp out of 1..3: ' + q.aDp);
            assert(q.bDp >= 1 && q.bDp <= 3, 'bDp out of 1..3: ' + q.bDp);
            if (q.aDp === 1 || q.bDp === 1) sawDp1 = true;
            if (q.aDp === 2 || q.bDp === 2) sawDp2 = true;
            if (q.aDp === 3 || q.bDp === 3) sawDp3 = true;
            const m = q.questionText.match(/^(\d+\.\d+) × (\d+\.\d+) = \?$/);
            assert(m, 'malformed prompt: ' + q.questionText);
            const a = parseFloat(m[1]);
            const b = parseFloat(m[2]);
            // Free mode integer part is 1..9 — factors must be ≥1 (no leading 0.X)
            assert(a >= 1 && b >= 1, 'free-mode factor < 1: ' + q.questionText);
            // Place-value rule still holds (totalDp scale; tolerance for float)
            assert(Math.abs(q.answer - a * b) < 1e-6,
                   `answer mismatch: ${q.answer} vs ${a}*${b}=${a*b}`);
            // Answer's dp ≤ aDp + bDp (max 6)
            const ansStr = q.answer.toString();
            const dotIdx = ansStr.indexOf('.');
            const ansDp = dotIdx === -1 ? 0 : ansStr.length - dotIdx - 1;
            assert(ansDp <= q.aDp + q.bDp,
                   `place-value rule violated: ${ansStr} (${ansDp} dp) > aDp+bDp=${q.aDp+q.bDp}`);
          }
          assert(sawDp1, '1 dp factor never sampled');
          assert(sawDp2, '2 dp factor never sampled');
          assert(sawDp3, '3 dp factor never sampled');
        } finally {
          K.dState.submode = prev;
        }
      });

      // ------ genNumberLine (P2.2) ------
      test('genNumberLine target is a tenth in (0, 1)', () => {
        for (let i = 0; i < 100; i++) {
          const q = K.gen.numberLine();
          assert(q.kind === 'numberline', 'wrong kind: ' + q.kind);
          assert(q.target > 0 && q.target < 1, 'out of range: ' + q.target);
          // q.target should be a clean tenth (0.1, 0.2, ..., 0.9)
          const tenth = Math.round(q.target * 10);
          assert(Math.abs(q.target - tenth / 10) < 1e-9, 'not a clean tenth: ' + q.target);
          assert(q.targetStr === q.target.toFixed(1), 'targetStr/target mismatch');
        }
      });

      test('NL_TOLERANCE matches half-tick-width on a 10-tick axis', () => {
        // Tick spacing on 0..1 axis with 10 ticks = 0.1, so half-tick = 0.05.
        // The card AC requires "tap-target tolerance ≥½× tick width".
        assert(Math.abs(K.NL_TOLERANCE - 0.05) < 1e-9,
               'tolerance wrong: ' + K.NL_TOLERANCE);
      });

      // ------ Geometry (Ayala engineering track, card 4A05znX6) ------
      test('GEO_SHAPES is the 6-shape curriculum surface', () => {
        assert(Array.isArray(K.GEO_SHAPES), 'not an array');
        assert(K.GEO_SHAPES.length === 6, 'expected 6 shapes, got ' + K.GEO_SHAPES.length);
        const keys = K.GEO_SHAPES.map(s => s.key).sort().join(',');
        assert(keys === 'circle,parall,rect,square,trap,triangle',
          'wrong shape keys: ' + keys);
      });

      test('every GEO_SHAPES row carries area + perimeter formulas + legend', () => {
        K.GEO_SHAPES.forEach(s => {
          assert(typeof s.area === 'string' && s.area.length > 0, s.key + ' missing area');
          assert(typeof s.perim === 'string' && s.perim.length > 0, s.key + ' missing perim');
          assert(typeof s.legendKey === 'string' && s.legendKey.startsWith('geo-'),
            s.key + ' missing legend key');
        });
      });

      test('GEO_PI is locked at 3.14 (kid-verifiable answer)', () => {
        assert(K.GEO_PI === 3.14, 'GEO_PI drifted: ' + K.GEO_PI);
      });

      test('genCircle returns either area or perimeter direction', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.circle();
          assert(q.direction === 'area' || q.direction === 'perim',
            'bad direction: ' + q.direction);
          assert(q.kind === 'circle-' + q.direction, 'kind/direction mismatch');
        }
      });

      test('genCircle radius is integer in 1..20', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.circle();
          assert(Number.isInteger(q.r), 'non-integer r: ' + q.r);
          assert(q.r >= 1 && q.r <= 20, 'r out of range: ' + q.r);
        }
      });

      test('genCircle area answer = round(π·r², 2dp)', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.circle();
          if (q.direction !== 'area') continue;
          const expected = Math.round(K.GEO_PI * q.r * q.r * 100) / 100;
          assert(Math.abs(q.answer - expected) < 1e-9,
            'r=' + q.r + ' area: got ' + q.answer + ', expected ' + expected);
        }
      });

      test('genCircle perimeter answer = round(2·π·r, 2dp)', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.circle();
          if (q.direction !== 'perim') continue;
          const expected = Math.round(2 * K.GEO_PI * q.r * 100) / 100;
          assert(Math.abs(q.answer - expected) < 1e-9,
            'r=' + q.r + ' perim: got ' + q.answer + ', expected ' + expected);
        }
      });

      test('genCircle question text contains the radius value', () => {
        for (let i = 0; i < 100; i++) {
          const q = K.gen.circle();
          const en = K.formatQuestion(q, 'en').questionText;
          assert(en.includes(String(q.r)),
            'r=' + q.r + ' not in question: ' + en);
        }
      });

      test('genCircle samples both directions over enough runs', () => {
        const dirs = new Set();
        for (let i = 0; i < 100; i++) dirs.add(K.gen.circle().direction);
        assert(dirs.has('area') && dirs.has('perim'),
          'one direction never sampled: ' + [...dirs]);
      });

      // ------ Libi M1 generators (card Mbv4Lutt) ------
      test('LIBI_MODULES has the 4 M1 keys', () => {
        const keys = K.LIBI_MODULES.map(m => m.key).sort().join(',');
        assert(keys === 'addsub,compare,fracpure,multdiv', 'wrong keys: ' + keys);
      });

      // genCompareWhole
      test('genCompareWhole operands in [0, 20] by default', () => {
        for (let i = 0; i < 300; i++) {
          const q = K.gen.compareWhole();
          assert(Number.isInteger(q.a) && q.a >= 0 && q.a <= 20, 'a out: ' + q.a);
          assert(Number.isInteger(q.b) && q.b >= 0 && q.b <= 20, 'b out: ' + q.b);
        }
      });

      test('genCompareWhole operator matches numeric comparison', () => {
        for (let i = 0; i < 300; i++) {
          const q = K.gen.compareWhole();
          const expected = q.a < q.b ? '<' : q.a > q.b ? '>' : '=';
          assert(q.operator === expected,
            q.a + ' vs ' + q.b + ': gen=' + q.operator + ', math=' + expected);
        }
      });

      test('genCompareWhole honors custom min/max', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.compareWhole({ min: 5, max: 9 });
          assert(q.a >= 5 && q.a <= 9 && q.b >= 5 && q.b <= 9,
            'out of [5,9]: ' + q.a + ',' + q.b);
        }
      });

      test('genCompareWhole hits all 3 operators over enough samples', () => {
        const ops = new Set();
        for (let i = 0; i < 500; i++) ops.add(K.gen.compareWhole({ min: 0, max: 5 }).operator);
        assert(ops.has('<') && ops.has('>') && ops.has('='),
          'missing operator: ' + [...ops]);
      });

      // genAddSub20
      test('genAddSub20 stays in [0, 20] for operands AND answer', () => {
        for (let i = 0; i < 400; i++) {
          const q = K.gen.addsub20();
          assert(q.a >= 0 && q.a <= 20, 'a: ' + q.a);
          assert(q.b >= 0 && q.b <= 20, 'b: ' + q.b);
          assert(q.answer >= 0 && q.answer <= 20, 'answer: ' + q.answer);
          const expected = q.op === '+' ? q.a + q.b : q.a - q.b;
          assert(q.answer === expected, q.a + q.op + q.b + ' != ' + q.answer);
        }
      });

      test('genAddSub20 supports forced op', () => {
        for (let i = 0; i < 50; i++) assert(K.gen.addsub20({ op: '+' }).op === '+', 'op not forced');
        for (let i = 0; i < 50; i++) assert(K.gen.addsub20({ op: '-' }).op === '-', 'op not forced');
      });

      // genMultDiv20
      test('genMultDiv20 multiplication: operands 2..10, product ≤ 20', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.multdiv20({ op: '×' });
          assert(q.a >= 2 && q.a <= 10, 'a: ' + q.a);
          assert(q.b >= 2 && q.b <= 10, 'b: ' + q.b);
          assert(q.answer === q.a * q.b, 'wrong product');
          assert(q.answer <= 20, 'product > 20: ' + q.answer);
        }
      });

      test('genMultDiv20 division: never divide-by-zero, answer ∈ [2,10]', () => {
        for (let i = 0; i < 200; i++) {
          const q = K.gen.multdiv20({ op: '÷' });
          assert(q.b !== 0, 'divide by zero');
          assert(q.a % q.b === 0, 'non-integer division: ' + q.a + '/' + q.b);
          assert(q.answer === q.a / q.b, 'wrong quotient');
          assert(q.answer >= 2 && q.answer <= 10, 'answer out: ' + q.answer);
        }
      });

      test('genMultDiv20 samples both ops over enough runs', () => {
        const ops = new Set();
        for (let i = 0; i < 100; i++) ops.add(K.gen.multdiv20().op);
        assert(ops.has('×') && ops.has('÷'), 'op missed: ' + [...ops]);
      });

      // genFractionsPure
      test('genFractionsPure denominators in [2,10], numerators proper', () => {
        for (let i = 0; i < 300; i++) {
          const q = K.gen.fractionsPure();
          assert(q.den1 >= 2 && q.den1 <= 10, 'den1: ' + q.den1);
          assert(q.den2 >= 2 && q.den2 <= 10, 'den2: ' + q.den2);
          assert(q.num1 >= 1 && q.num1 < q.den1, 'num1/den1 not proper');
          assert(q.num2 >= 1 && q.num2 < q.den2, 'num2/den2 not proper');
        }
      });

      test('genFractionsPure math correctness', () => {
        for (let i = 0; i < 300; i++) {
          const q = K.gen.fractionsPure();
          const rawN = q.op === '+' ? q.num1 * q.den2 + q.num2 * q.den1
                                    : q.num1 * q.den2 - q.num2 * q.den1;
          const rawD = q.den1 * q.den2;
          // q.answerNum/q.answerDen ≡ rawN/rawD
          assert(rawN * q.answerDen === rawD * q.answerNum,
            q.num1 + '/' + q.den1 + ' ' + q.op + ' ' + q.num2 + '/' + q.den2 +
            ' -> ' + q.answerNum + '/' + q.answerDen);
        }
      });

      test('genFractionsPure subtraction never goes negative', () => {
        for (let i = 0; i < 300; i++) {
          const q = K.gen.fractionsPure({ op: '-' });
          assert(q.answerNum >= 0, 'negative answer: ' + q.answerNum + '/' + q.answerDen);
        }
      });

      test('genFractionsPure answer is in lowest terms', () => {
        // gcd helper for the test (we don't expose K.gcd from this module)
        function g(a, b) { a=Math.abs(a); b=Math.abs(b); while(b){const t=b; b=a%b; a=t;} return a||1; }
        for (let i = 0; i < 200; i++) {
          const q = K.gen.fractionsPure();
          assert(g(q.answerNum, q.answerDen) === 1,
            'not reduced: ' + q.answerNum + '/' + q.answerDen);
        }
      });

      // ------ formatQuestion (lGNRlF0p regression) ------
      // The English locale used to leave the Place-value, Percent, Measurements, and
      // Circle prompts in Hebrew because the generators pre-rendered the prose at
      // creation time. Generators now store language-agnostic params and
      // formatQuestion(q, lang) is the single source of truth for display strings.
      test('formatQuestion(place-value, en) renders English prose with named place', () => {
        for (let i = 0; i < 30; i++) {
          const q = K.gen.placeValue();
          const en = K.formatQuestion(q, 'en').subQuestion;
          assert(en === 'Which digit is in the ' + q.placeKey + ' place?',
            'EN prompt wrong: ' + en);
          assert(!/[֐-׿]/.test(en), 'EN prompt contains Hebrew: ' + en);
        }
      });

      test('formatQuestion(place-value, he) renders Hebrew prose with named place', () => {
        for (let i = 0; i < 30; i++) {
          const q = K.gen.placeValue();
          const he = K.formatQuestion(q, 'he').subQuestion;
          assert(/^איזו ספרה במקום ה.+\?$/.test(he), 'HE prompt wrong: ' + he);
        }
      });

      test('formatQuestion(percent-whole, en/he) renders the percent prose in current lang', () => {
        for (let i = 0; i < 20; i++) {
          const q = K.gen.percentWhole();
          const en = K.formatQuestion(q, 'en').questionText;
          const he = K.formatQuestion(q, 'he').questionText;
          assert(en === q.p + '% of ' + q.base + ' = ?', 'EN wrong: ' + en);
          assert(he === 'כמה זה ' + q.p + '% מ-' + q.base + '?', 'HE wrong: ' + he);
          assert(!/[֐-׿]/.test(en), 'EN percent-whole contains Hebrew: ' + en);
        }
      });

      test('formatQuestion(percent-decimal, en/he) renders the percent prose in current lang', () => {
        for (let i = 0; i < 20; i++) {
          const q = K.gen.percentDecimal();
          const en = K.formatQuestion(q, 'en').questionText;
          const he = K.formatQuestion(q, 'he').questionText;
          assert(en === q.p + '% of ' + q.baseStr + ' = ?', 'EN wrong: ' + en);
          assert(he === 'כמה זה ' + q.p + '% מ-' + q.baseStr + '?', 'HE wrong: ' + he);
          assert(!/[֐-׿]/.test(en), 'EN percent-decimal contains Hebrew: ' + en);
        }
      });

      test('formatQuestion(measurements, en) renders English unit labels', () => {
        const allowedEn = new Set(['m', 'cm', 'mm']);
        for (let i = 0; i < 30; i++) {
          const q = K.gen.measurements();
          const en = K.formatQuestion(q, 'en').questionText;
          // Match pattern: "<num> <unit> = ? <unit>"
          const m = en.match(/^[\d.]+ (m|cm|mm) = \? (m|cm|mm)$/);
          assert(m, 'EN measurements format wrong: ' + en);
          assert(allowedEn.has(m[1]) && allowedEn.has(m[2]), 'EN units wrong: ' + m[1] + '/' + m[2]);
          assert(!/[֐-׿]/.test(en), 'EN measurements contains Hebrew: ' + en);
        }
      });

      test('formatQuestion(measurements, he) renders Hebrew unit labels', () => {
        for (let i = 0; i < 30; i++) {
          const q = K.gen.measurements();
          const he = K.formatQuestion(q, 'he').questionText;
          // Hebrew labels: מ׳ / ס״מ / מ״מ
          assert(/[֐-׿]/.test(he), 'HE measurements has no Hebrew: ' + he);
        }
      });

      test('formatQuestion(circle, en) renders English geometry prose with r value', () => {
        for (let i = 0; i < 20; i++) {
          const q = K.gen.circle();
          const en = K.formatQuestion(q, 'en').questionText;
          const expected = (q.direction === 'area' ? 'Area' : 'Perimeter') +
                           ' of a circle, r = ' + q.r;
          assert(en === expected, 'EN circle wrong: ' + en);
          assert(!/[֐-׿]/.test(en), 'EN circle contains Hebrew: ' + en);
        }
      });

      test('formatQuestion is pure — same q yields same output for the same lang', () => {
        const q = K.gen.placeValue();
        const a = K.formatQuestion(q, 'en').subQuestion;
        const b = K.formatQuestion(q, 'en').subQuestion;
        assert(a === b, 'formatQuestion not pure: ' + a + ' vs ' + b);
      });

      test('formatQuestion handles unknown kind via passthrough', () => {
        const q = { kind: 'unit-conv', questionText: '0.3 = ?/10', subQuestion: '', answer: 3 };
        const fmt = K.formatQuestion(q, 'en');
        assert(fmt.questionText === '0.3 = ?/10', 'passthrough broken: ' + fmt.questionText);
      });

      finish();
    }

    function finish() {
      const failed = results.filter(r => !r.ok);
      if (failed.length === 0) {
        document.title = 'PASS';
        summary.className = 'summary-pass';
        summary.innerHTML = '<h2 class="pass">PASS — ' + results.length + ' tests</h2>';
      } else {
        document.title = 'FAIL: ' + failed.map(r => r.name).join('; ').slice(0, 200);
        summary.className = 'summary-fail';
        summary.innerHTML = '<h2 class="fail">FAIL — ' + failed.length + ' of ' + results.length + ' tests failed</h2>';
      }
    }

    // Wait for iframe to fully boot index.html, then run.
    document.getElementById('app').addEventListener('load', () => {
      // Tiny delay to let __kaflon attach in the iframe's main script tail.
      setTimeout(runTests, 100);
    });

    // Hard timeout in case the iframe never fires `load`.
    setTimeout(() => {
      if (document.title === 'Kaflon Tests') {
        record('iframe loaded within 15s', false, 'timed out');
        finish();
      }
    }, 15000);
  </script>
