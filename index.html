<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>Kaflon · כפלון — תרגול מתמטיקה לילדים</title>
  <link rel="canonical" href="https://kaflon.opsagents.agency/">
  <meta name="description" content="תרגול חינמי של כפל, חילוק, שברים ועשרוניים לילדים. קוד פתוח, בלי הרשמה, בלי פרסומות.">
  <meta property="og:title" content="Kaflon · כפלון">
  <meta property="og:description" content="תרגול מתמטיקה חינמי לילדים — כפל, חילוק, ועוד.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%96%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
    body { font-family: 'Heebo', 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    [dir="ltr"] { font-family: 'Inter', 'Heebo', system-ui, sans-serif; }
    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .answer-input { -moz-appearance: textfield; }
    @keyframes flash-correct { 0% { background-color: rgb(34 197 94); color: white; transform: scale(1.05); } 100% { background-color: transparent; transform: scale(1); } }
    @keyframes flash-wrong { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .flash-correct { animation: flash-correct 0.7s ease-out; }
    .flash-wrong { animation: flash-wrong 0.4s ease-in-out; background-color: rgb(254 226 226); }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop { animation: pop 0.3s ease-out; }
    /* Math expressions stay LTR even in RTL layouts */
    .math { direction: ltr; unicode-bidi: isolate; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 flex flex-col items-center p-4 pt-8">

  <div id="app" class="w-full max-w-md">

    <header class="flex items-center justify-between mb-6 gap-2">
      <h1 class="text-4xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
        Kaflon
      </h1>
      <div class="flex gap-2">
        <button id="profile-chip" class="hidden px-3 py-2 bg-white rounded-full shadow-md text-sm font-bold hover:shadow-lg active:scale-95 transition" aria-label="Switch profile"></button>
        <button id="lang-toggle" class="px-4 py-2 bg-white rounded-full shadow-md text-sm font-bold hover:shadow-lg active:scale-95 transition">
          English
        </button>
      </div>
    </header>

    <!-- PROFILE PICKER -->
    <section id="profile-picker" class="bg-white rounded-3xl shadow-xl p-6 space-y-5">
      <h2 class="text-2xl font-black text-center" data-i18n="who-playing">מי משחק?</h2>
      <div id="profile-grid" class="space-y-3"></div>
      <button id="add-profile-btn" class="w-full py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-lg active:scale-95 transition" data-i18n="add-kid">
        + הוסף ילד/ה
      </button>

      <!-- inline add-profile form -->
      <div id="add-profile-form" class="hidden space-y-3 border-t pt-4">
        <input id="new-profile-name" type="text" maxlength="20" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-lg focus:border-indigo-500 outline-none text-center font-bold" placeholder="שם הילד/ה">
        <div class="grid grid-cols-2 gap-2">
          <button data-gender="f" class="gender-btn py-3 rounded-xl bg-pink-50 font-bold active:scale-95 transition" data-i18n="girl">בת</button>
          <button data-gender="m" class="gender-btn py-3 rounded-xl bg-blue-50 font-bold active:scale-95 transition" data-i18n="boy">בן</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button id="confirm-add-profile" class="py-3 bg-indigo-600 text-white rounded-xl font-bold active:scale-95 transition" data-i18n="save">שמור</button>
          <button id="cancel-add-profile" class="py-3 bg-slate-100 rounded-xl font-bold active:scale-95 transition" data-i18n="cancel">ביטול</button>
        </div>
      </div>
    </section>

    <!-- SETTINGS — × ÷ home (Moshe / multiply-divide track) -->
    <section id="settings" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-6">

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="mode">מצב</label>
        <div class="grid grid-cols-3 gap-2">
          <button data-mode="multiply" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition math">×</button>
          <button data-mode="divide" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition math">÷</button>
          <button data-mode="mixed" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-2xl active:scale-95 transition math">×÷</button>
          <button data-mode="squares" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="squares">ריבועים</button>
          <button data-mode="doubles" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="doubles">כפל ב-2</button>
          <button data-mode="halves" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="halves">חצאים</button>
        </div>
      </div>

      <div id="difficulty-row">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="difficulty">רמת קושי</label>
        <div class="grid grid-cols-2 gap-2">
          <button data-diff="single" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="single-table">לוח אחד</button>
          <button data-diff="random" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="random">אקראי</button>
        </div>
      </div>

      <div id="table-picker" class="hidden">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="pick-table">בחרו לוח</label>
        <div id="table-picker-grid" class="grid grid-cols-5 gap-2"></div>
      </div>

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="sound">צלילים 🔔</label>
        <div class="grid grid-cols-2 gap-2">
          <button id="sound-off-btn" class="sound-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="off">כבוי</button>
          <button id="sound-on-btn" class="sound-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="on">פעיל</button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="numpad">לוח ספרות 🔢</label>
        <div class="grid grid-cols-2 gap-2">
          <button id="numpad-off-btn" class="numpad-toggle-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="off">כבוי</button>
          <button id="numpad-on-btn" class="numpad-toggle-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="on">פעיל</button>
        </div>
      </div>

      <button id="start-btn" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 hover:shadow-xl transition" data-i18n="start">
        מתחילים! 🚀
      </button>
    </section>

    <!-- AYALA / DECIMALS — curriculum menu (modules stubbed for v0.3) -->
    <section id="decimals-menu" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-4">
      <div>
        <h2 class="text-2xl font-black" data-i18n="pick-drill">איזה תרגיל היום?</h2>
        <p class="text-sm text-slate-500 mt-1" data-i18n="decimals-blurb">מסלול שברים עשרוניים — מתחילים בקרוב!</p>
      </div>
      <div class="space-y-2" id="decimals-modules"></div>
    </section>

    <!-- GAME -->
    <section id="game" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-5">

      <div class="flex justify-between text-base">
        <div class="bg-indigo-50 rounded-full px-4 py-2">
          <span data-i18n="score">ניקוד</span>: <span id="score" class="font-black text-indigo-600">0</span>
        </div>
        <div class="bg-orange-50 rounded-full px-4 py-2">
          <span data-i18n="streak">רצף</span>: <span id="streak" class="font-black text-orange-600">0</span> <span id="streak-emoji">🔥</span>
        </div>
      </div>

      <div id="question" class="math text-7xl sm:text-8xl font-black text-center py-10 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl select-none">
        7 × 8
      </div>

      <input
        id="answer"
        type="number"
        inputmode="numeric"
        autocomplete="off"
        class="answer-input w-full text-5xl text-center py-5 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black"
        placeholder="?"
      >

      <div class="grid grid-cols-4 gap-2">
        <button id="submit-btn" class="col-span-3 py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">
          בדיקה ✓
        </button>
        <button id="back-btn" class="py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-2xl active:scale-95 transition" aria-label="Settings">
          ⚙
        </button>
      </div>

      <div id="feedback" class="text-center font-bold text-lg min-h-[28px]"></div>
    </section>

    <!-- DECIMAL DRILL — Ayala P1.1 (place value + unit conversions) -->
    <section id="decimal-drill" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-5">

      <div class="flex justify-between text-base">
        <div class="bg-indigo-50 rounded-full px-4 py-2">
          <span data-i18n="score">ניקוד</span>: <span id="d-score" class="font-black text-indigo-600">0</span>
        </div>
        <div class="bg-orange-50 rounded-full px-4 py-2">
          <span data-i18n="streak">רצף</span>: <span id="d-streak" class="font-black text-orange-600">0</span> <span id="d-streak-emoji">🔥</span>
        </div>
      </div>

      <div id="d-submode-row" class="grid grid-cols-3 gap-2">
        <button data-decimal-mode="place-value" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="place-value-mode">מקומות</button>
        <button data-decimal-mode="unit-conv" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="unit-conv-mode">המרות</button>
        <button data-decimal-mode="mixed-dec" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="decimal-mixed">מעורב</button>
      </div>

      <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl py-8 px-4 text-center select-none space-y-2">
        <div id="d-question" class="math text-6xl sm:text-7xl font-black">0.273</div>
        <div id="d-subquestion" class="text-xl font-bold text-slate-700"></div>
      </div>

      <div id="d-number-row" class="space-y-3">
        <input
          id="d-answer"
          type="number"
          inputmode="numeric"
          autocomplete="off"
          class="answer-input w-full text-5xl text-center py-5 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black"
          placeholder="?"
        >
        <button id="d-submit-btn" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">
          בדיקה ✓
        </button>
      </div>

      <div id="d-choice-row" class="hidden grid grid-cols-3 gap-2">
        <button data-choice="-1" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">&lt;</button>
        <button data-choice="0" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">=</button>
        <button data-choice="1" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">&gt;</button>
      </div>

      <button id="d-back-btn" class="w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-sm active:scale-95 transition" data-i18n="back-to-menu">תפריט</button>

      <div id="d-feedback" class="text-center font-bold text-lg min-h-[28px]"></div>
    </section>

    <!-- NUMPAD — floats below the answer; visible only in game/decimal-drill, number-mode, when toggle is on -->
    <div id="numpad" class="hidden w-full max-w-md space-y-2 mt-2">
      <div class="grid grid-cols-3 gap-2">
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="7">7</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="8">8</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="9">9</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="4">4</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="5">5</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="6">6</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="1">1</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="2">2</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="3">3</button>
        <button id="numpad-dot" class="numpad-key hidden py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key=".">.</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="0">0</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="backspace">⌫</button>
      </div>
      <button class="numpad-key w-full py-4 bg-green-500 text-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-green-600 transition" data-key="enter">✓</button>
    </div>

    <footer class="text-center text-xs text-slate-500 mt-8 space-y-1">
      <p>
        <a href="https://github.com/OpsAgentsAI/kaflon" class="underline hover:text-indigo-600">GitHub</a>
        ·
        <span data-i18n="built-with">נבנה עם Claude Code</span>
        ·
        <span data-i18n="free-oss">חינמי וקוד פתוח</span>
      </p>
      <p class="text-slate-400">
        <a href="https://msapps.mobi" class="hover:text-indigo-600">MSApps</a> ·
        <a href="https://opsagents.agency" class="hover:text-indigo-600">OpsAgents</a>
      </p>
    </footer>
  </div>

  <script>
    // ---------- i18n ----------
    const i18n = {
      en: {
        mode: 'Mode',
        difficulty: 'Difficulty',
        'single-table': 'Single table',
        random: 'Random',
        'pick-table': 'Pick a table',
        start: 'Start! 🚀',
        score: 'Score',
        streak: 'Streak',
        check: 'Check ✓',
        'built-with': 'Built with Claude Code',
        'free-oss': 'Free & open source',
        correct: 'Correct! 🎉',
        wrong: 'Almost! The answer is',
        great: 'Great streak!',
        amazing: 'Amazing!',
        fire: 'On fire!',
        'who-playing': "Who's playing?",
        'add-kid': '+ Add kid',
        girl: 'Girl',
        boy: 'Boy',
        save: 'Save',
        cancel: 'Cancel',
        'pick-drill': "What are we practicing today?",
        'decimals-blurb': 'Decimals track — coming soon!',
        'coming-soon': 'coming soon',
        'switch-profile': 'Switch profile',
        squares: 'Squares',
        doubles: 'Doubles',
        halves: 'Halves',
        sound: 'Sound',
        numpad: 'Numpad',
        on: 'On',
        off: 'Off',
        'place-value-mode': 'Places',
        'unit-conv-mode': 'Conversions',
        'decimal-mixed': 'Mixed',
        tenths: 'tenths',
        hundredths: 'hundredths',
        thousandths: 'thousandths',
        'place-question': 'Which digit is in the {place} place?',
        'place-value': 'Place value',
        'unit-conv': 'Unit conversions',
        'p1-1-name': 'Place value & unit conversions',
        'back-to-menu': 'Menu'
      },
      he: {
        mode: 'מצב',
        difficulty: 'רמת קושי',
        'single-table': 'לוח אחד',
        random: 'אקראי',
        'pick-table': 'בחרו לוח',
        start: 'מתחילים! 🚀',
        score: 'ניקוד',
        streak: 'רצף',
        check: 'בדיקה ✓',
        'built-with': 'נבנה עם Claude Code',
        'free-oss': 'חינמי וקוד פתוח',
        correct: 'נכון! 🎉',
        wrong: 'כמעט! התשובה היא',
        great: 'רצף יפה!',
        amazing: 'מדהים!',
        fire: 'בוערים!',
        'who-playing': 'מי משחק?',
        'add-kid': '+ הוסף ילד/ה',
        girl: 'בת',
        boy: 'בן',
        save: 'שמור',
        cancel: 'ביטול',
        'pick-drill': 'איזה תרגיל היום?',
        'decimals-blurb': 'מסלול שברים עשרוניים — מתחילים בקרוב!',
        'coming-soon': 'בקרוב',
        'switch-profile': 'החלף פרופיל',
        squares: 'ריבועים',
        doubles: 'כפל ב-2',
        halves: 'חצאים',
        sound: 'צלילים',
        numpad: 'לוח ספרות',
        on: 'פעיל',
        off: 'כבוי',
        'place-value-mode': 'מקומות',
        'unit-conv-mode': 'המרות',
        'decimal-mixed': 'מעורב',
        tenths: 'עשיריות',
        hundredths: 'מאיות',
        thousandths: 'אלפיות',
        'place-question': 'איזו ספרה במקום ה{place}?',
        'place-value': 'מבנה עשרוני',
        'unit-conv': 'המרות יחידות',
        'p1-1-name': 'מבנה עשרוני והמרות יחידות',
        'back-to-menu': 'תפריט'
      }
    };

    // Hebrew is the default (kids app for Israeli kids)
    let lang = localStorage.getItem('kaflon-lang') || 'he';

    function applyLang() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'en' ? 'עברית' : 'English';
      localStorage.setItem('kaflon-lang', lang);
      renderProfileChip();
      renderProfileGrid();
      renderDecimalsMenu();
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'en' ? 'he' : 'en';
      applyLang();
    });

    // ---------- profiles ----------
    // One-shot migration: legacy `kaflon-best` belongs to Moshe (the original kid)
    const legacyBest = localStorage.getItem('kaflon-best');
    if (legacyBest && !localStorage.getItem('kaflon.profiles.moshe.best')) {
      localStorage.setItem('kaflon.profiles.moshe.best', legacyBest);
      localStorage.removeItem('kaflon-best');
    }

    // Seed default profiles on first load
    let profiles = JSON.parse(localStorage.getItem('kaflon.profiles') || 'null');
    if (!profiles) {
      profiles = [
        { id: 'moshe', name: { he: 'משה', en: 'Moshe' }, gender: 'm', track: 'multiply-divide' },
        { id: 'ayala', name: { he: 'איילה', en: 'Ayala' }, gender: 'f', track: 'decimals' }
      ];
      localStorage.setItem('kaflon.profiles', JSON.stringify(profiles));
    }

    function saveProfiles() {
      localStorage.setItem('kaflon.profiles', JSON.stringify(profiles));
    }

    let activeProfileId = localStorage.getItem('kaflon.activeProfile');

    function activeProfile() {
      return profiles.find(p => p.id === activeProfileId) || null;
    }

    function showScreen(id) {
      ['profile-picker', 'settings', 'decimals-menu', 'game', 'decimal-drill'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
      if (typeof updateNumpadVisibility === 'function') updateNumpadVisibility();
    }

    function routeProfile() {
      const p = activeProfile();
      if (!p) {
        showScreen('profile-picker');
        document.getElementById('profile-chip').classList.add('hidden');
        return;
      }

    // ---------- audio (Web Audio API, no mp3 assets) ----------
    let audioCtx = null;
    function ensureAudioCtx() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function tone(freq, startOffset, duration, peakGain) {
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, now + startOffset);
      g.gain.linearRampToValueAtTime(peakGain, now + startOffset + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + startOffset + duration);
      o.start(now + startOffset);
      o.stop(now + startOffset + duration);
    }
    function playCorrect() {
      if (!state.soundOn) return;
      if (!ensureAudioCtx()) return;
      tone(523.25, 0, 0.18, 0.15);     // C5
      tone(659.25, 0.10, 0.20, 0.15);  // E5
    }
    function playWrong() {
      if (!state.soundOn) return;
      if (!ensureAudioCtx()) return;
      tone(196.0, 0, 0.30, 0.12);      // G3 gentle low
    }

    // ---------- question generator ----------
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function nextQuestion() {
      let questionText, answer;

      if (state.mode === 'squares') {
        const n = rand(2, 10);
        questionText = `${n} × ${n}`;
        answer = n * n;
      } else if (state.mode === 'doubles') {
        const n = rand(1, 20);
        questionText = `${n} × 2`;
        answer = n * 2;
      } else if (state.mode === 'halves') {
        const n = rand(1, 20);
        questionText = `${n * 2} ÷ 2`;
        answer = n;
      } else {
        let op;
        if (state.mode === 'mixed') op = Math.random() < 0.5 ? '×' : '÷';
        else op = state.mode === 'multiply' ? '×' : '÷';
        let a, b;
        if (state.diff === 'single') { a = state.table; b = rand(1, 10); }
        else { a = rand(1, 10); b = rand(1, 10); }
        if (op === '×') { questionText = `${a} × ${b}`; answer = a * b; }
        else { questionText = `${a * b} ÷ ${b}`; answer = a; } // (a*b) ÷ b = a → always whole
      }

      state.current = { questionText, answer };
      const q = document.getElementById('question');
      q.textContent = questionText;

    // ---------- start ----------

    // ---------- submit ----------
    function streakEmoji(s) {
      if (s >= 20) return '🚀';
      if (s >= 10) return '⚡';
      if (s >= 5) return '🔥';
      return '✨';
    }

    function submit() {
      const v = parseInt(document.getElementById('answer').value, 10);
      if (isNaN(v)) return;
      const q = document.getElementById('question');
      const fb = document.getElementById('feedback');

      if (v === state.current.answer) {
        playCorrect();

        state.streak++;

          state.best = state.streak;

        if (state.streak === 10) msg = i18n[lang].fire + ' ' + i18n[lang].correct;

    // ---------- decimal drill (Ayala P1.x) ----------
    // activeModule selects which curriculum module is loaded.
    // answerKind selects which input UI is shown ('number' | 'choice').
    const dState = {
      activeModule: 'p1-1',
      submode: 'place-value',
      answerKind: 'number',
      score: 0,
      streak: 0,
      best: 0,
      current: null
    };

    function dBestKey() {
      return `kaflon.profiles.${activeProfileId}.decimal-best`;
    }

    const PLACES = [
      { key: 'tenths', pos: 1 },       // index after the decimal point
      { key: 'hundredths', pos: 2 },
      { key: 'thousandths', pos: 3 }
    ];

    // Generator 1: name-the-place. Pick a 3dp number, ask which digit is at place X.
    function genPlaceValue() {
      const intPart = rand(0, 9);
      const tenths = rand(0, 9);
      const hundredths = rand(0, 9);
      const thousandths = rand(0, 9);
      const digits = [intPart, tenths, hundredths, thousandths];
      // Pad so the kid sees the full 3-decimal form
      const num = `${intPart}.${tenths}${hundredths}${thousandths}`;
      const place = PLACES[rand(0, 2)];
      const placeName = i18n[lang][place.key] || place.key;
      const template = i18n[lang]['place-question'] || 'Which digit is in the {place} place?';
      const subQuestion = template.replace('{place}', placeName);
      return {
        questionText: num,
        subQuestion,
        answer: digits[place.pos],
        kind: 'place-value'
      };
    }

    // Generator 2: unit conversion (tenths <-> hundredths <-> thousandths).
    // Shape: "value = ?/denom" where value * denom = answer.
    function genUnitConv() {
      const denoms = [10, 100, 1000];
      const denom = denoms[rand(0, 2)];
      const answer = rand(1, denom - 1);
      // Express as a clean decimal (no trailing zeros)
      const valueNum = answer / denom;
      const valueStr = valueNum.toString();
      return {
        questionText: `${valueStr} = ?/${denom}`,
        subQuestion: '',
        answer,
        kind: 'unit-conv'
      };
    }

    // Generator 3: compare decimals. Two decimals, answer ∈ {-1, 0, 1}.
    function genCompare() {
      const styles = ['equal-different-form', 'leading-zero-trap', 'tiny-diff', 'large-diff'];
      const style = styles[rand(0, 3)];
      let aStr, bStr, aNum, bNum;

      if (style === 'equal-different-form') {
        // 0.4 vs 0.40 / 0.5 vs 0.500 — trap on trailing zeros
        const baseNum = rand(1, 9) / 10;
        aStr = baseNum.toString();
        bStr = baseNum.toFixed(rand(2, 3));
        aNum = baseNum;
        bNum = baseNum;
      } else if (style === 'leading-zero-trap') {
        // 0.07 vs 0.7 — trap on positional value
        const d = rand(1, 9);
        aStr = `0.0${d}`;
        bStr = `0.${d}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      } else if (style === 'tiny-diff') {
        // 0.3 vs 0.27 — same prefix different length
        const aTen = rand(1, 8);
        aStr = `0.${aTen}`;
        bStr = `0.${aTen - 1}${rand(1, 9)}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      } else { // large-diff
        const aT = rand(2, 9);
        const bH = rand(1, 9);
        aStr = `0.${aT}`;
        bStr = `0.0${bH}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      }

      // Randomize side order ~50% so the answer isn't biased
      if (Math.random() < 0.5) {
        [aStr, bStr] = [bStr, aStr];
        [aNum, bNum] = [bNum, aNum];
      }

      let answer;
      if (aNum < bNum) answer = -1;
      else if (aNum > bNum) answer = 1;
      else answer = 0;

      return {
        questionText: `${aStr} ☐ ${bStr}`,
        subQuestion: '',
        answer,
        kind: 'compare'
      };
    }

    // Generator 4: add + subtract decimals. Answer is a decimal number.
    function genAddSub() {
      function pick() {
        const dp = rand(1, 2);
        const mult = Math.pow(10, dp);
        const intPart = rand(1, 9 * mult); // 0.1–9.9 (1dp) or 0.01–9.99 (2dp)
        const value = intPart / mult;
        return { value, str: value.toString() };
      }
      let a = pick();
      let b = pick();
      const op = Math.random() < 0.5 ? '+' : '−';
      if (op === '−' && a.value < b.value) {
        [a, b] = [b, a]; // ensure non-negative result
      }
      let answer = op === '+' ? a.value + b.value : a.value - b.value;
      answer = Math.round(answer * 100) / 100; // dodge float artifacts
      return {
        questionText: `${a.str} ${op} ${b.str} = ?`,
        subQuestion: '',
        answer,
        kind: 'addsub'
      };
    }

    // Generator 5: × and ÷ by 10, 100, 1000. Same point-shift mechanic.
    function genMulDivPow10() {
      const multipliers = [10, 100, 1000];
      const m = multipliers[rand(0, 2)];
      const op = Math.random() < 0.5 ? '×' : '÷';
      let valueStr, answer;

      if (op === '×') {
        // Pick a decimal value; m shifts it left to a larger number
        const dpMax = Math.log10(m); // 1, 2, or 3
        const dpMin = m === 1000 ? 2 : 1; // keep answers reasonable
        const dp = rand(dpMin, dpMax);
        const div = Math.pow(10, dp);
        const intPart = rand(1, 99);
        const value = intPart / div;
        valueStr = value.toString();
        answer = Math.round(value * m * 10000) / 10000;
      } else {
        // ÷ — pick an integer, m shifts it right to a decimal
        const intPart = rand(1, 999);
        valueStr = intPart.toString();
        answer = Math.round((intPart / m) * 10000) / 10000;
      }

      return {
        questionText: `${valueStr} ${op} ${m} = ?`,
        subQuestion: '',
        answer,
        kind: 'muldivpow10'
      };
    }

    function nextDecimalQuestion() {
      let q;
      if (dState.activeModule === 'p1-2') {
        q = genCompare();
      } else if (dState.activeModule === 'p1-3') {
        q = genAddSub();
      } else if (dState.activeModule === 'p1-4') {
        q = genMulDivPow10();
      } else if (dState.submode === 'mixed-dec') {
        q = Math.random() < 0.5 ? genPlaceValue() : genUnitConv();
      } else if (dState.submode === 'unit-conv') {
        q = genUnitConv();
      } else {
        q = genPlaceValue();
      }
      dState.current = q;
      const qEl = document.getElementById('d-question');
      const subEl = document.getElementById('d-subquestion');
      qEl.textContent = q.questionText;
      subEl.textContent = q.subQuestion;
      qEl.classList.add('pop');
      setTimeout(() => qEl.classList.remove('pop'), 300);
      const input = document.getElementById('d-answer');
      if (input) input.value = '';
      if (dState.answerKind === 'number' && input) input.focus();
      document.getElementById('d-feedback').textContent = '';
    }

    function selectDecimalMode(el) {
      document.querySelectorAll('.decimal-mode-btn').forEach(x => {
        x.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        x.classList.add('bg-indigo-50');
      });
      el.classList.remove('bg-indigo-50');
      el.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
      dState.submode = el.dataset.decimalMode;
      nextDecimalQuestion();
    }
    document.querySelectorAll('.decimal-mode-btn').forEach(b =>
      b.addEventListener('click', () => selectDecimalMode(b))
    );

    function applyDrillUI() {
      // toggle which input UI is showing
      document.getElementById('d-number-row').classList.toggle('hidden', dState.answerKind !== 'number');
      document.getElementById('d-choice-row').classList.toggle('hidden', dState.answerKind !== 'choice');
      // show sub-mode toggle only for modules that have sub-modes (P1.1)
      document.getElementById('d-submode-row').classList.toggle('hidden', dState.activeModule !== 'p1-1');
      if (typeof updateNumpadVisibility === 'function') updateNumpadVisibility();
    }

    function resetDrillScores() {
      dState.score = 0;
      dState.streak = 0;
      dState.best = parseInt(localStorage.getItem(dBestKey()) || '0', 10);
      document.getElementById('d-score').textContent = '0';
      document.getElementById('d-streak').textContent = '0';
      document.getElementById('d-streak-emoji').textContent = '🔥';
    }

    function setAnswerInputMode(mode) {
      const input = document.getElementById('d-answer');
      input.setAttribute('inputmode', mode);
      if (mode === 'decimal') input.setAttribute('step', '0.01');
      else input.removeAttribute('step');
    }

    function enterDecimalDrill() {
      dState.activeModule = 'p1-1';
      dState.answerKind = 'number';
      setAnswerInputMode('numeric');
      resetDrillScores();
      applyDrillUI();
      // default to place-value submode visually
      selectDecimalMode(document.querySelector('[data-decimal-mode="place-value"]'));
      showScreen('decimal-drill');
    }

    function enterCompareDecimals() {
      dState.activeModule = 'p1-2';
      dState.answerKind = 'choice';
      setAnswerInputMode('numeric');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterAddSubDecimals() {
      dState.activeModule = 'p1-3';
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterMulDivPow10() {
      dState.activeModule = 'p1-4';
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function submitDecimal() {
      const raw = document.getElementById('d-answer').value.trim();
      if (raw === '' || dState.current == null) return;
      const v = parseFloat(raw);
      if (isNaN(v)) return;
      const qEl = document.getElementById('d-question');
      const fb = document.getElementById('d-feedback');
      // Float-tolerant correctness — also matches "1.95" vs "1.950" cleanly,
      // and is harmless for integer-answer modes (1 - 1 < 0.005).
      const correct = Math.abs(v - dState.current.answer) < 0.005;

      if (correct) {
        playCorrect();
        dState.score++;
        dState.streak++;
        if (dState.streak > dState.best) {
          dState.best = dState.streak;
          localStorage.setItem(dBestKey(), dState.best);
        }
        document.getElementById('d-score').textContent = dState.score;
        document.getElementById('d-streak').textContent = dState.streak;
        document.getElementById('d-streak-emoji').textContent = streakEmoji(dState.streak);
        qEl.classList.add('flash-correct');
        let msg = i18n[lang].correct;
        if (dState.streak === 5) msg = i18n[lang].great + ' ' + i18n[lang].correct;
        if (dState.streak === 10) msg = i18n[lang].fire + ' ' + i18n[lang].correct;
        if (dState.streak === 20) msg = i18n[lang].amazing + ' ' + i18n[lang].correct;
        fb.textContent = msg;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-green-600';
        setTimeout(() => {
          qEl.classList.remove('flash-correct');
          nextDecimalQuestion();
        }, 700);
      } else {
        playWrong();
        dState.streak = 0;
        document.getElementById('d-streak').textContent = '0';
        document.getElementById('d-streak-emoji').textContent = '🔥';
        qEl.classList.add('flash-wrong');
        fb.textContent = `${i18n[lang].wrong} ${dState.current.answer}`;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-red-600';
        setTimeout(() => {
          qEl.classList.remove('flash-wrong');
          nextDecimalQuestion();
        }, 1600);
      }
    }

    document.getElementById('d-submit-btn').addEventListener('click', submitDecimal);
    document.getElementById('d-answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitDecimal();
    });
    document.querySelectorAll('.d-choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (dState.current == null) return;
        const v = parseInt(btn.dataset.choice, 10);
        // reuse the same correct/wrong path as submitDecimal by stashing the value
        const fakeInput = { value: String(v) };
        const realInput = document.getElementById('d-answer');
        realInput.value = String(v);
        submitDecimal();
      });
    });
    document.getElementById('d-back-btn').addEventListener('click', () => {
      showScreen('decimals-menu');
    });

    // ---------- boot ----------
    applyLang();
    routeProfile();
  </script>
</body>
</html>
