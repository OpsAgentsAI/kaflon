<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>Kaflon · כפלון — תרגול מתמטיקה לילדים</title>
  <link rel="canonical" href="https://kaflon.web.app/">
  <meta name="description" content="תרגול חינמי של כפל, חילוק, שברים ועשרוניים לילדים. קוד פתוח, בלי הרשמה, בלי פרסומות.">
  <meta property="og:title" content="Kaflon · כפלון">
  <meta property="og:description" content="תרגול מתמטיקה חינמי לילדים — כפל, חילוק, ועוד.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%96%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
    body { font-family: 'Heebo', 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    [dir="ltr"] { font-family: 'Inter', 'Heebo', system-ui, sans-serif; }
    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .answer-input { -moz-appearance: textfield; }
    @keyframes flash-correct { 0% { background-color: rgb(34 197 94); color: white; transform: scale(1.05); } 100% { background-color: transparent; transform: scale(1); } }
    @keyframes flash-wrong { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .flash-correct { animation: flash-correct 0.7s ease-out; }
    .flash-wrong { animation: flash-wrong 0.4s ease-in-out; background-color: rgb(254 226 226); }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop { animation: pop 0.3s ease-out; }
    /* Math expressions stay LTR even in RTL layouts */
    .math { direction: ltr; unicode-bidi: isolate; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 flex flex-col items-center p-4 pt-8">

  <div id="app" class="w-full max-w-md">

    <header class="flex items-center justify-between mb-6 gap-2">
      <h1 class="text-4xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
        Kaflon
      </h1>
      <div class="flex gap-2">
        <button id="profile-chip" class="hidden px-3 py-2 bg-white rounded-full shadow-md text-sm font-bold hover:shadow-lg active:scale-95 transition" aria-label="Switch profile"></button>
        <button id="lang-toggle" class="px-4 py-2 bg-white rounded-full shadow-md text-sm font-bold hover:shadow-lg active:scale-95 transition">
          English
        </button>
      </div>
    </header>

    <!-- PROFILE PICKER -->
    <section id="profile-picker" class="bg-white rounded-3xl shadow-xl p-6 space-y-5">
      <h2 class="text-2xl font-black text-center" data-i18n="who-playing">מי משחק?</h2>
      <div id="profile-grid" class="space-y-3"></div>
      <button id="add-profile-btn" class="w-full py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-lg active:scale-95 transition" data-i18n="add-kid">
        + הוסף ילד/ה
      </button>

      <!-- inline add-profile form -->
      <div id="add-profile-form" class="hidden space-y-3 border-t pt-4">
        <input id="new-profile-name" type="text" maxlength="20" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-lg focus:border-indigo-500 outline-none text-center font-bold" placeholder="שם הילד/ה">
        <div class="grid grid-cols-2 gap-2">
          <button data-gender="f" class="gender-btn py-3 rounded-xl bg-pink-50 font-bold active:scale-95 transition" data-i18n="girl">בת</button>
          <button data-gender="m" class="gender-btn py-3 rounded-xl bg-blue-50 font-bold active:scale-95 transition" data-i18n="boy">בן</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button id="confirm-add-profile" class="py-3 bg-indigo-600 text-white rounded-xl font-bold active:scale-95 transition" data-i18n="save">שמור</button>
          <button id="cancel-add-profile" class="py-3 bg-slate-100 rounded-xl font-bold active:scale-95 transition" data-i18n="cancel">ביטול</button>
        </div>
      </div>
    </section>

    <!-- SETTINGS — × ÷ home (Moshe / multiply-divide track) -->
    <section id="settings" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-6">

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="mode">מצב</label>
        <div class="grid grid-cols-3 gap-2">
          <button data-mode="multiply" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition math">×</button>
          <button data-mode="divide" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition math">÷</button>
          <button data-mode="mixed" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-2xl active:scale-95 transition math">×÷</button>
          <button data-mode="squares" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="squares">ריבועים</button>
          <button data-mode="doubles" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="doubles">כפל ב-2</button>
          <button data-mode="halves" class="mode-btn px-2 py-4 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="halves">חצאים</button>
        </div>
      </div>

      <div id="difficulty-row">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="difficulty">רמת קושי</label>
        <div class="grid grid-cols-2 gap-2">
          <button data-diff="single" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="single-table">לוח אחד</button>
          <button data-diff="random" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="random">אקראי</button>
        </div>
      </div>

      <div id="table-picker" class="hidden">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="pick-table">בחרו לוח</label>
        <div id="table-picker-grid" class="grid grid-cols-5 gap-2"></div>
      </div>

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="sound">צלילים 🔔</label>
        <div class="grid grid-cols-2 gap-2">
          <button id="sound-off-btn" class="sound-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="off">כבוי</button>
          <button id="sound-on-btn" class="sound-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="on">פעיל</button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="numpad">לוח ספרות 🔢</label>
        <div class="grid grid-cols-2 gap-2">
          <button id="numpad-off-btn" class="numpad-toggle-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="off">כבוי</button>
          <button id="numpad-on-btn" class="numpad-toggle-btn px-3 py-3 rounded-2xl bg-slate-100 font-bold active:scale-95 transition" data-i18n="on">פעיל</button>
        </div>
      </div>

      <button id="start-btn" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 hover:shadow-xl transition" data-i18n="start">
        מתחילים! 🚀
      </button>
    </section>

    <!-- AYALA / DECIMALS — curriculum menu (modules stubbed for v0.3) -->
    <section id="decimals-menu" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-4">
      <div>
        <h2 class="text-2xl font-black" data-i18n="pick-drill">איזה תרגיל היום?</h2>
        <p class="text-sm text-slate-500 mt-1" data-i18n="decimals-blurb">מסלול שברים עשרוניים — מתחילים בקרוב!</p>
      </div>
      <div class="space-y-2" id="decimals-modules"></div>
    </section>

    <!-- GAME -->
    <section id="game" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-5">

      <div class="flex justify-between text-base">
        <div class="bg-indigo-50 rounded-full px-4 py-2">
          <span data-i18n="score">ניקוד</span>: <span id="score" class="font-black text-indigo-600">0</span>
        </div>
        <div class="bg-orange-50 rounded-full px-4 py-2">
          <span data-i18n="streak">רצף</span>: <span id="streak" class="font-black text-orange-600">0</span> <span id="streak-emoji">🔥</span>
        </div>
      </div>

      <div id="question" class="math text-7xl sm:text-8xl font-black text-center py-10 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl select-none">
        7 × 8
      </div>

      <input
        id="answer"
        type="number"
        inputmode="numeric"
        autocomplete="off"
        class="answer-input w-full text-5xl text-center py-5 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black"
        placeholder="?"
      >

      <div class="grid grid-cols-4 gap-2">
        <button id="submit-btn" class="col-span-3 py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">
          בדיקה ✓
        </button>
        <button id="back-btn" class="py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-2xl active:scale-95 transition" aria-label="Settings">
          ⚙
        </button>
      </div>

      <div id="feedback" class="text-center font-bold text-lg min-h-[28px]"></div>
    </section>

    <!-- DECIMAL DRILL — Ayala P1.1 (place value + unit conversions) -->
    <section id="decimal-drill" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-5">

      <div class="flex justify-between text-base">
        <div class="bg-indigo-50 rounded-full px-4 py-2">
          <span data-i18n="score">ניקוד</span>: <span id="d-score" class="font-black text-indigo-600">0</span>
        </div>
        <div class="bg-orange-50 rounded-full px-4 py-2">
          <span data-i18n="streak">רצף</span>: <span id="d-streak" class="font-black text-orange-600">0</span> <span id="d-streak-emoji">🔥</span>
        </div>
      </div>

      <div id="d-submode-row" class="grid grid-cols-3 gap-2">
        <button data-decimal-mode="place-value" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="place-value-mode">מקומות</button>
        <button data-decimal-mode="unit-conv" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="unit-conv-mode">המרות</button>
        <button data-decimal-mode="mixed-dec" class="decimal-mode-btn px-2 py-3 rounded-2xl bg-indigo-50 font-bold text-sm active:scale-95 transition" data-i18n="decimal-mixed">מעורב</button>
      </div>

      <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl py-8 px-4 text-center select-none space-y-2">
        <div id="d-question" class="math text-6xl sm:text-7xl font-black">0.273</div>
        <div id="d-subquestion" class="text-xl font-bold text-slate-700"></div>
      </div>

      <div id="d-number-row" class="space-y-3">
        <input
          id="d-answer"
          type="number"
          inputmode="numeric"
          autocomplete="off"
          class="answer-input w-full text-5xl text-center py-5 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black"
          placeholder="?"
        >
        <button id="d-submit-btn" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">
          בדיקה ✓
        </button>
      </div>

      <div id="d-choice-row" class="hidden grid grid-cols-3 gap-2">
        <button data-choice="-1" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">&lt;</button>
        <button data-choice="0" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">=</button>
        <button data-choice="1" class="d-choice-btn math py-6 bg-purple-50 hover:bg-purple-100 rounded-2xl font-black text-5xl active:scale-95 transition">&gt;</button>
      </div>

      <div id="d-fraction-row" class="hidden space-y-3">
        <div class="flex flex-col items-center gap-2 max-w-xs mx-auto">
          <input id="d-numerator" type="number" inputmode="numeric" autocomplete="off" class="answer-input w-32 text-4xl text-center py-3 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black" placeholder="?">
          <div class="h-1 w-32 bg-slate-800 rounded"></div>
          <input id="d-denominator" type="number" inputmode="numeric" autocomplete="off" class="answer-input w-32 text-4xl text-center py-3 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black" placeholder="?">
        </div>
        <button id="d-fraction-submit-btn" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">בדיקה ✓</button>
      </div>

      <div id="d-numberline-row" class="hidden space-y-3">
        <svg id="d-numberline-svg" viewBox="0 0 400 100" class="w-full h-28 cursor-pointer touch-none select-none" style="direction:ltr;">
          <line x1="20" y1="60" x2="380" y2="60" stroke="#1e293b" stroke-width="3" stroke-linecap="round"></line>
          <g id="d-numberline-ticks"></g>
          <g id="d-numberline-marker" class="hidden">
            <circle id="d-numberline-mark-correct" cx="0" cy="60" r="10" fill="#16a34a" opacity="0.85"></circle>
            <circle id="d-numberline-mark-tapped" cx="0" cy="60" r="8" fill="#dc2626" opacity="0.85"></circle>
          </g>
        </svg>
      </div>

      <button id="d-back-btn" class="w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-sm active:scale-95 transition" data-i18n="back-to-menu">תפריט</button>

      <div id="d-feedback" class="text-center font-bold text-lg min-h-[28px]"></div>
    </section>

    <!-- NUMPAD — floats below the answer; visible only in game/decimal-drill, number-mode, when toggle is on -->
    <div id="numpad" class="hidden w-full max-w-md space-y-2 mt-2">
      <div class="grid grid-cols-3 gap-2">
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="7">7</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="8">8</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="9">9</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="4">4</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="5">5</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="6">6</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="1">1</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="2">2</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="3">3</button>
        <button id="numpad-dot" class="numpad-key hidden py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key=".">.</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="0">0</button>
        <button class="numpad-key py-4 bg-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-indigo-50 transition" data-key="backspace">⌫</button>
      </div>
      <button class="numpad-key w-full py-4 bg-green-500 text-white rounded-2xl font-black text-2xl shadow active:scale-95 active:bg-green-600 transition" data-key="enter">✓</button>
    </div>

    <footer class="text-center text-xs text-slate-500 mt-8 space-y-1">
      <p>
        <a href="https://github.com/OpsAgentsAI/kaflon" class="underline hover:text-indigo-600">GitHub</a>
        ·
        <span data-i18n="built-with">נבנה עם Claude Code</span>
        ·
        <span data-i18n="free-oss">חינמי וקוד פתוח</span>
      </p>
      <p class="text-slate-400">
        <a href="https://msapps.mobi" class="hover:text-indigo-600">MSApps</a> ·
        <a href="https://opsagents.agency" class="hover:text-indigo-600">OpsAgents</a>
      </p>
    </footer>
  </div>

        'unit-m': 'מטר',
        'unit-cm': 'ס״מ',
        'unit-mm': 'מ״מ'
      }
    };

    // Hebrew is the default (kids app for Israeli kids)
    let lang = localStorage.getItem('kaflon-lang') || 'he';

    function applyLang() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'en' ? 'עברית' : 'English';
      localStorage.setItem('kaflon-lang', lang);
      renderProfileChip();
      renderProfileGrid();
      renderDecimalsMenu();
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'en' ? 'he' : 'en';
      applyLang();
    });

    // ---------- profiles ----------
    // One-shot migration: legacy `kaflon-best` belongs to Moshe (the original kid)
    const legacyBest = localStorage.getItem('kaflon-best');
    if (legacyBest && !localStorage.getItem('kaflon.profiles.moshe.best')) {
      localStorage.setItem('kaflon.profiles.moshe.best', legacyBest);
      localStorage.removeItem('kaflon-best');
    }

    // Seed default profiles on first load
    let profiles = JSON.parse(localStorage.getItem('kaflon.profiles') || 'null');
    if (!profiles) {
      profiles = [
        { id: 'moshe', name: { he: 'משה', en: 'Moshe' }, gender: 'm', track: 'multiply-divide' },
        { id: 'ayala', name: { he: 'איילה', en: 'Ayala' }, gender: 'f', track: 'decimals' }
      ];
      localStorage.setItem('kaflon.profiles', JSON.stringify(profiles));
    }

    function saveProfiles() {
      localStorage.setItem('kaflon.profiles', JSON.stringify(profiles));
    }

    let activeProfileId = localStorage.getItem('kaflon.activeProfile');

    function activeProfile() {
      return profiles.find(p => p.id === activeProfileId) || null;
    }

    function showScreen(id) {
      ['profile-picker', 'settings', 'decimals-menu', 'game', 'decimal-drill'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
      if (typeof updateNumpadVisibility === 'function') updateNumpadVisibility();
    }

    function routeProfile() {
      const p = activeProfile();
      if (!p) {
        showScreen('profile-picker');
        document.getElementById('profile-chip').classList.add('hidden');
        return;
      }
      document.getElementById('profile-chip').classList.remove('hidden');
      renderProfileChip();
      if (p.track === 'decimals') {
        showScreen('decimals-menu');
      } else {
        // multiply-divide is the default
        loadBestForActive();
        showScreen('settings');
      }
    }

    function renderProfileChip() {
      const p = activeProfile();
      if (!p) return;
      const chip = document.getElementById('profile-chip');
      const name = p.name[lang] || p.name.he || p.name.en;
      const arrow = lang === 'he' ? '‹' : '›';
      chip.textContent = `${name} ${arrow}`;
      chip.title = i18n[lang]['switch-profile'];
    }

    function renderProfileGrid() {
      const grid = document.getElementById('profile-grid');
      grid.innerHTML = '';
      profiles.forEach(p => {
        const btn = document.createElement('button');
        const name = p.name[lang] || p.name.he || p.name.en;
        const emoji = p.gender === 'f' ? '👧' : p.gender === 'm' ? '👦' : '🧒';
        btn.className = 'w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-2xl font-black text-2xl shadow-md active:scale-95 hover:shadow-lg transition';
        btn.textContent = `${emoji} ${name}`;
        btn.addEventListener('click', () => {
          activeProfileId = p.id;
          localStorage.setItem('kaflon.activeProfile', p.id);
          routeProfile();
        });
        grid.appendChild(btn);
      });
    }

    // Decimals curriculum (12 modules). `enter` set → active drill entry.
    const DECIMAL_MODULES = [
      { key: 'p1-1',        he: 'מבנה עשרוני והמרות יחידות', en: 'Place value & unit conversions', enter: enterDecimalDrill },
      { key: 'compare',     he: 'השוואה (>, <, =)', en: 'Compare decimals', enter: enterCompareDecimals },
      { key: 'add-sub',     he: 'חיבור וחיסור', en: 'Add + subtract', enter: enterAddSubDecimals },
      { key: 'mul-div-pow10', he: 'כפל וחילוק ב-10, 100, 1000', en: '× and ÷ by 10, 100, 1000', enter: enterMulDivPow10 },
      { key: 'fractions',   he: 'שברים עשרוניים (3/10 ↔ 0.3)', en: 'Decimal fractions', enter: enterDecimalFractions },
      { key: 'numberline',  he: 'מיקום על ישר המספרים', en: 'Number line', enter: enterNumberLine },
      { key: 'measure',     he: 'מידות (מטר, ס״מ, מ״מ)', en: 'Measurements (m, cm, mm)', enter: enterMeasurements },
      { key: 'percent',     he: 'אחוזים', en: 'Percentages', enter: enterPercentages },
      { key: 'percent-dec', he: 'אחוזים ממספרים עשרוניים', en: 'Percentages of decimals' },
      { key: 'mul-dec',     he: 'כפל מספרים עשרוניים', en: 'Decimal × decimal' }
    ];

    function renderDecimalsMenu() {
      const list = document.getElementById('decimals-modules');
      list.innerHTML = '';
      DECIMAL_MODULES.forEach(m => {
        const isActive = typeof m.enter === 'function';
        const row = document.createElement(isActive ? 'button' : 'div');
        if (isActive) {
          row.className = 'w-full py-4 px-4 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl flex items-center justify-between text-base font-bold active:scale-95 hover:shadow-lg transition';
          row.addEventListener('click', () => m.enter());
        } else {
          row.className = 'w-full py-3 px-4 bg-slate-50 rounded-xl flex items-center justify-between text-base opacity-70';
        }
        const label = document.createElement('span');
        label.className = 'font-bold';
        label.textContent = m[lang] || m.he;
        const tag = document.createElement('span');
        if (isActive) {
          tag.className = 'text-lg';
          tag.textContent = '▸';
        } else {
          tag.className = 'text-xs px-2 py-1 bg-slate-200 rounded-full text-slate-600';
          tag.textContent = i18n[lang]['coming-soon'];
        }
        row.appendChild(label);
        row.appendChild(tag);
        list.appendChild(row);
      });
    }

    // ---------- add-profile flow ----------
    let newProfileGender = 'f';
    document.getElementById('add-profile-btn').addEventListener('click', () => {
      document.getElementById('add-profile-form').classList.remove('hidden');
      document.getElementById('new-profile-name').focus();
    });
    document.getElementById('cancel-add-profile').addEventListener('click', () => {
      document.getElementById('add-profile-form').classList.add('hidden');
      document.getElementById('new-profile-name').value = '';
    });
    document.querySelectorAll('.gender-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.gender-btn').forEach(b => {
          b.classList.remove('bg-pink-600', 'bg-blue-600', 'text-white');
          if (b.dataset.gender === 'f') b.classList.add('bg-pink-50');
          else b.classList.add('bg-blue-50');
        });
        btn.classList.remove('bg-pink-50', 'bg-blue-50');
        btn.classList.add(btn.dataset.gender === 'f' ? 'bg-pink-600' : 'bg-blue-600', 'text-white');
        newProfileGender = btn.dataset.gender;
      });
    });
    // default selection
    document.querySelector('.gender-btn[data-gender="f"]').click();

    document.getElementById('confirm-add-profile').addEventListener('click', () => {
      const name = document.getElementById('new-profile-name').value.trim();
      if (!name) return;
      const id = 'k_' + Date.now().toString(36);
      // new profiles default to multiply-divide track — they can graduate to decimals later
      profiles.push({ id, name: { he: name, en: name }, gender: newProfileGender, track: 'multiply-divide' });
      saveProfiles();
      document.getElementById('new-profile-name').value = '';
      document.getElementById('add-profile-form').classList.add('hidden');
      renderProfileGrid();
    });

    // profile chip → back to picker
    document.getElementById('profile-chip').addEventListener('click', () => {
      showScreen('profile-picker');
    });

    // ---------- state (multiply-divide track) ----------
    const state = {
      mode: 'multiply',
      diff: 'random',
      table: 5,
      score: 0,
      streak: 0,
      best: 0,
      soundOn: false,
      numpadOn: false,
      current: null
    };

    function bestKey() {
      return `kaflon.profiles.${activeProfileId}.best`;
    }
    function soundKey() {
      return `kaflon.profiles.${activeProfileId}.sound`;
    }
    function numpadKey() {
      return `kaflon.profiles.${activeProfileId}.numpad`;
    }
    function loadBestForActive() {
      state.best = parseInt(localStorage.getItem(bestKey()) || '0', 10);
      state.soundOn = localStorage.getItem(soundKey()) === 'on';
      state.numpadOn = localStorage.getItem(numpadKey()) === 'on';
      applySoundButtons();
      applyNumpadButtons();
      updateNumpadVisibility();
    }

    // ---------- audio (Web Audio API, no mp3 assets) ----------
    let audioCtx = null;
    function ensureAudioCtx() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function tone(freq, startOffset, duration, peakGain) {
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, now + startOffset);
      g.gain.linearRampToValueAtTime(peakGain, now + startOffset + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + startOffset + duration);
      o.start(now + startOffset);
      o.stop(now + startOffset + duration);
    }
    function playCorrect() {
      if (!state.soundOn) return;
      if (!ensureAudioCtx()) return;
      tone(523.25, 0, 0.18, 0.15);     // C5
      tone(659.25, 0.10, 0.20, 0.15);  // E5
    }
    function playWrong() {
      if (!state.soundOn) return;
      if (!ensureAudioCtx()) return;
      tone(196.0, 0, 0.30, 0.12);      // G3 gentle low
    }

    function applySoundButtons() {
      const on = document.getElementById('sound-on-btn');
      const off = document.getElementById('sound-off-btn');
      if (!on || !off) return;
      [on, off].forEach(b => {
        b.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
        b.classList.add('bg-slate-100');
      });
      const target = state.soundOn ? on : off;
      target.classList.remove('bg-slate-100');
      target.classList.add('bg-purple-600', 'text-white', 'shadow-md');
    }
    document.getElementById('sound-on-btn').addEventListener('click', () => {
      state.soundOn = true;
      if (activeProfileId) localStorage.setItem(soundKey(), 'on');
      applySoundButtons();
      ensureAudioCtx(); // unlock context with user gesture
    });
    document.getElementById('sound-off-btn').addEventListener('click', () => {
      state.soundOn = false;
      if (activeProfileId) localStorage.setItem(soundKey(), 'off');
      applySoundButtons();
    });
    applySoundButtons();

    // ---------- numpad (v0.1, off by default) ----------
    function applyNumpadButtons() {
      const on = document.getElementById('numpad-on-btn');
      const off = document.getElementById('numpad-off-btn');
      if (!on || !off) return;
      [on, off].forEach(b => {
        b.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
        b.classList.add('bg-slate-100');
      });
      const target = state.numpadOn ? on : off;
      target.classList.remove('bg-slate-100');
      target.classList.add('bg-purple-600', 'text-white', 'shadow-md');
    }
    document.getElementById('numpad-on-btn').addEventListener('click', () => {
      state.numpadOn = true;
      if (activeProfileId) localStorage.setItem(numpadKey(), 'on');
      applyNumpadButtons();
      updateNumpadVisibility();
    });
    document.getElementById('numpad-off-btn').addEventListener('click', () => {
      state.numpadOn = false;
      if (activeProfileId) localStorage.setItem(numpadKey(), 'off');
      applyNumpadButtons();
      updateNumpadVisibility();
    });
    applyNumpadButtons();

    function activeAnswerInput() {
      if (!document.getElementById('game').classList.contains('hidden'))
        return document.getElementById('answer');
      if (!document.getElementById('decimal-drill').classList.contains('hidden'))
        return document.getElementById('d-answer');
      return null;
    }
    function activeSubmitFn() {
      if (!document.getElementById('game').classList.contains('hidden')) return submit;
      if (!document.getElementById('decimal-drill').classList.contains('hidden')) return submitDecimal;
      return null;
    }

    function updateNumpadVisibility() {
      const np = document.getElementById('numpad');
      if (!np) return;
      const inDecimalChoice =
        !document.getElementById('decimal-drill').classList.contains('hidden') &&
        dState.answerKind === 'choice';
      const inGameOrDrill = activeAnswerInput() != null;
      const show = state.numpadOn && inGameOrDrill && !inDecimalChoice;
      np.classList.toggle('hidden', !show);
      // Decimal-point key only useful when answers can have a decimal point
      const showDot =
        !document.getElementById('decimal-drill').classList.contains('hidden') &&
        (dState.activeModule === 'p1-3' || dState.activeModule === 'p1-4');
      document.getElementById('numpad-dot').classList.toggle('hidden', !showDot);
    }

    document.querySelectorAll('.numpad-key').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const input = activeAnswerInput();
        if (!input) return;
        if (key === 'enter') {
          const fn = activeSubmitFn();
          if (fn) fn();
          return;
        }
        if (key === 'backspace') {
          input.value = input.value.slice(0, -1);
          return;
        }
        if (key === '.') {
          if (input.value.includes('.')) return; // single dot
          input.value += '.';
          return;
        }
        input.value += key; // digit
      });
    });

    // ---------- mode buttons ----------
    const SHAPED_MODES = new Set(['squares', 'doubles', 'halves']);
    function selectMode(el) {
      document.querySelectorAll('.mode-btn').forEach(x => {
        x.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        x.classList.add('bg-indigo-50');
      });
      el.classList.remove('bg-indigo-50');
      el.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
      state.mode = el.dataset.mode;
      // Shaped modes have their own fixed shape — hide the multiply/divide knobs
      const isShaped = SHAPED_MODES.has(state.mode);
      document.getElementById('difficulty-row').classList.toggle('hidden', isShaped);
      if (isShaped) document.getElementById('table-picker').classList.add('hidden');
      else if (state.diff === 'single') document.getElementById('table-picker').classList.remove('hidden');
    }
    document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => selectMode(b)));
    selectMode(document.querySelector('[data-mode="multiply"]'));

    // ---------- difficulty buttons ----------
    function selectDiff(el) {
      document.querySelectorAll('.diff-btn').forEach(x => {
        x.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
        x.classList.add('bg-purple-50');
      });
      el.classList.remove('bg-purple-50');
      el.classList.add('bg-purple-600', 'text-white', 'shadow-md');
      state.diff = el.dataset.diff;
      document.getElementById('table-picker').classList.toggle('hidden', el.dataset.diff !== 'single');
    }
    document.querySelectorAll('.diff-btn').forEach(b => b.addEventListener('click', () => selectDiff(b)));
    selectDiff(document.querySelector('[data-diff="random"]'));

    // ---------- table picker ----------
    const tableGrid = document.getElementById('table-picker-grid');
    for (let i = 2; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = 'table-btn py-3 rounded-xl bg-purple-100 font-bold text-lg active:scale-95 transition';
      btn.addEventListener('click', () => {
        document.querySelectorAll('.table-btn').forEach(x => {
          x.classList.remove('bg-purple-600', 'text-white');
          x.classList.add('bg-purple-100');
        });
        btn.classList.remove('bg-purple-100');
        btn.classList.add('bg-purple-600', 'text-white');
        state.table = i;
      });
      tableGrid.appendChild(btn);
      if (i === 5) btn.click();
    }

    // ---------- question generator ----------
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function nextQuestion() {
      let questionText, answer;

      if (state.mode === 'squares') {
        const n = rand(2, 10);
        questionText = `${n} × ${n}`;
        answer = n * n;
      } else if (state.mode === 'doubles') {
        const n = rand(1, 20);
        questionText = `${n} × 2`;
        answer = n * 2;
      } else if (state.mode === 'halves') {
        const n = rand(1, 20);
        questionText = `${n * 2} ÷ 2`;
        answer = n;
      } else {
        let op;
        if (state.mode === 'mixed') op = Math.random() < 0.5 ? '×' : '÷';
        else op = state.mode === 'multiply' ? '×' : '÷';
        let a, b;
        if (state.diff === 'single') { a = state.table; b = rand(1, 10); }
        else { a = rand(1, 10); b = rand(1, 10); }
        if (op === '×') { questionText = `${a} × ${b}`; answer = a * b; }
        else { questionText = `${a * b} ÷ ${b}`; answer = a; } // (a*b) ÷ b = a → always whole
      }

      state.current = { questionText, answer };
      const q = document.getElementById('question');
      q.textContent = questionText;
      q.classList.add('pop');
      setTimeout(() => q.classList.remove('pop'), 300);

      const input = document.getElementById('answer');
      input.value = '';
      input.focus();
      document.getElementById('feedback').textContent = '';
    }

    // ---------- start ----------
    document.getElementById('start-btn').addEventListener('click', () => {
      showScreen('game');
      state.score = 0;
      state.streak = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '0';
      document.getElementById('streak-emoji').textContent = '🔥';
      nextQuestion();
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      showScreen('settings');
    });

    // ---------- submit ----------
    function streakEmoji(s) {
      if (s >= 20) return '🚀';
      if (s >= 10) return '⚡';
      if (s >= 5) return '🔥';
      return '✨';
    }

    function submit() {
      const v = parseInt(document.getElementById('answer').value, 10);
      if (isNaN(v)) return;
      const q = document.getElementById('question');
      const fb = document.getElementById('feedback');

      if (v === state.current.answer) {
        playCorrect();
        state.score++;
        state.streak++;
        if (state.streak > state.best) {
          state.best = state.streak;
          localStorage.setItem(bestKey(), state.best);
        }
        document.getElementById('score').textContent = state.score;
        document.getElementById('streak').textContent = state.streak;
        document.getElementById('streak-emoji').textContent = streakEmoji(state.streak);
        q.classList.add('flash-correct');
        let msg = i18n[lang].correct;
        if (state.streak === 5) msg = i18n[lang].great + ' ' + i18n[lang].correct;
        if (state.streak === 10) msg = i18n[lang].fire + ' ' + i18n[lang].correct;
        if (state.streak === 20) msg = i18n[lang].amazing + ' ' + i18n[lang].correct;
        fb.textContent = msg;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-green-600';
        setTimeout(() => {
          q.classList.remove('flash-correct');
          nextQuestion();
        }, 700);
      } else {
        playWrong();
        state.streak = 0;
        document.getElementById('streak').textContent = '0';
        document.getElementById('streak-emoji').textContent = '🔥';
        q.classList.add('flash-wrong');
        fb.textContent = `${i18n[lang].wrong} ${state.current.answer}`;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-red-600';
        setTimeout(() => {
          q.classList.remove('flash-wrong');
          nextQuestion();
        }, 1600);
      }
    }

    document.getElementById('submit-btn').addEventListener('click', submit);
    document.getElementById('answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });

    // ---------- decimal drill (Ayala P1.x) ----------
    // activeModule selects which curriculum module is loaded.
    // answerKind selects which input UI is shown ('number' | 'choice').
    const dState = {
      activeModule: 'p1-1',
      submode: 'place-value',
      answerKind: 'number',
      score: 0,
      streak: 0,
      best: 0,
      current: null
    };

    function dBestKey() {
      return `kaflon.profiles.${activeProfileId}.decimal-best`;
    }

    const PLACES = [
      { key: 'tenths', pos: 1 },       // index after the decimal point
      { key: 'hundredths', pos: 2 },
      { key: 'thousandths', pos: 3 }
    ];

    // Generator 1: name-the-place. Pick a 3dp number, ask which digit is at place X.
    function genPlaceValue() {
      const intPart = rand(0, 9);
      const tenths = rand(0, 9);
      const hundredths = rand(0, 9);
      const thousandths = rand(0, 9);
      const digits = [intPart, tenths, hundredths, thousandths];
      // Pad so the kid sees the full 3-decimal form
      const num = `${intPart}.${tenths}${hundredths}${thousandths}`;
      const place = PLACES[rand(0, 2)];
      const placeName = i18n[lang][place.key] || place.key;
      const template = i18n[lang]['place-question'] || 'Which digit is in the {place} place?';
      const subQuestion = template.replace('{place}', placeName);
      return {
        questionText: num,
        subQuestion,
        answer: digits[place.pos],
        kind: 'place-value'
      };
    }

    // Generator 2: unit conversion (tenths <-> hundredths <-> thousandths).
    // Shape: "value = ?/denom" where value * denom = answer.
    function genUnitConv() {
      const denoms = [10, 100, 1000];
      const denom = denoms[rand(0, 2)];
      const answer = rand(1, denom - 1);
      // Express as a clean decimal (no trailing zeros)
      const valueNum = answer / denom;
      const valueStr = valueNum.toString();
      return {
        questionText: `${valueStr} = ?/${denom}`,
        subQuestion: '',
        answer,
        kind: 'unit-conv'
      };
    }

    // Generator 3: compare decimals. Two decimals, answer ∈ {-1, 0, 1}.
    function genCompare() {
      const styles = ['equal-different-form', 'leading-zero-trap', 'tiny-diff', 'large-diff'];
      const style = styles[rand(0, 3)];
      let aStr, bStr, aNum, bNum;

      if (style === 'equal-different-form') {
        // 0.4 vs 0.40 / 0.5 vs 0.500 — trap on trailing zeros
        const baseNum = rand(1, 9) / 10;
        aStr = baseNum.toString();
        bStr = baseNum.toFixed(rand(2, 3));
        aNum = baseNum;
        bNum = baseNum;
      } else if (style === 'leading-zero-trap') {
        // 0.07 vs 0.7 — trap on positional value
        const d = rand(1, 9);
        aStr = `0.0${d}`;
        bStr = `0.${d}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      } else if (style === 'tiny-diff') {
        // 0.3 vs 0.27 — same prefix different length
        const aTen = rand(1, 8);
        aStr = `0.${aTen}`;
        bStr = `0.${aTen - 1}${rand(1, 9)}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      } else { // large-diff
        const aT = rand(2, 9);
        const bH = rand(1, 9);
        aStr = `0.${aT}`;
        bStr = `0.0${bH}`;
        aNum = parseFloat(aStr);
        bNum = parseFloat(bStr);
      }

      // Randomize side order ~50% so the answer isn't biased
      if (Math.random() < 0.5) {
        [aStr, bStr] = [bStr, aStr];
        [aNum, bNum] = [bNum, aNum];
      }

      let answer;
      if (aNum < bNum) answer = -1;
      else if (aNum > bNum) answer = 1;
      else answer = 0;

      return {
        questionText: `${aStr} ☐ ${bStr}`,
        subQuestion: '',
        answer,
        kind: 'compare'
      };
    }

    // Generator 4: add + subtract decimals. Answer is a decimal number.
    // Returns aDisplay/bDisplay padded to the same dp so the vertical
    // column render lines up the decimal points (school-style layout).
    function genAddSub() {
      function pick() {
        const dp = rand(1, 2);
        const mult = Math.pow(10, dp);
        const intPart = rand(1, 9 * mult); // 0.1–9.9 (1dp) or 0.01–9.99 (2dp)
        const value = intPart / mult;
        return { value, dp };
      }
      let a = pick();
      let b = pick();
      const op = Math.random() < 0.5 ? '+' : '−';
      if (op === '−' && a.value < b.value) {
        [a, b] = [b, a]; // ensure non-negative result
      }
      let answer = op === '+' ? a.value + b.value : a.value - b.value;
      answer = Math.round(answer * 100) / 100; // dodge float artifacts
      const maxDp = Math.max(a.dp, b.dp);
      const aDisplay = a.value.toFixed(maxDp);
      const bDisplay = b.value.toFixed(maxDp);
      return {
        questionText: `${aDisplay} ${op} ${bDisplay} = ?`, // fallback / a11y
        aDisplay,
        bDisplay,
        op,
        answer,
        kind: 'addsub'
      };
    }

    // Generator 5: × and ÷ by 10, 100, 1000. Same point-shift mechanic.
    function genMulDivPow10() {
      const multipliers = [10, 100, 1000];
      const m = multipliers[rand(0, 2)];
      const op = Math.random() < 0.5 ? '×' : '÷';
      let valueStr, answer;

      if (op === '×') {
        // Pick a decimal value; m shifts it left to a larger number
        const dpMax = Math.log10(m); // 1, 2, or 3
        const dpMin = m === 1000 ? 2 : 1; // keep answers reasonable
        const dp = rand(dpMin, dpMax);
        const div = Math.pow(10, dp);
        const intPart = rand(1, 99);
        const value = intPart / div;
        valueStr = value.toString();
        answer = Math.round(value * m * 10000) / 10000;
      } else {
        // ÷ — pick an integer, m shifts it right to a decimal
        const intPart = rand(1, 999);
        valueStr = intPart.toString();
        answer = Math.round((intPart / m) * 10000) / 10000;
      }

      return {
        questionText: `${valueStr} ${op} ${m} = ?`,
        subQuestion: '',
        answer,
        kind: 'muldivpow10'
      };
    }

    // Generator 6: decimal fractions. Bidirectional (3/10 ↔ 0.3).
    // Each question's answerKind alternates: 'number' for frac→dec,
    // 'fraction' for dec→frac. Answer-equivalence via cross-multiply.
    function genDecimalFractions() {
      const denoms = [10, 100, 1000];
      const denom = denoms[rand(0, 2)];
      const num = rand(1, denom - 1);
      const direction = Math.random() < 0.5 ? 'to-decimal' : 'to-fraction';

      if (direction === 'to-decimal') {
        return {
          questionText: `${num}/${denom} = ?`,
          subQuestion: '',
          answer: num / denom,
          kind: 'frac-to-dec',
          answerKind: 'number'
        };
      }
      const decValue = num / denom;
      return {
        questionText: `${decValue.toString()} = ?/?`,
        subQuestion: '',
        answerNumerator: num,
        answerDenominator: denom,
        kind: 'dec-to-frac',
        answerKind: 'fraction'
      };
    }

    // Generator P2.2: number line tap. Two zoom levels: tenths (0-1) and
    // hundredths (0.3-0.4). Target answer falls on a tick. Tolerance = ½ tick.
    function genNumberLine() {
      const zoom = Math.random() < 0.6 ? 'tenths' : 'hundredths';
      let min, max, tickCount, target, displayDp;
      if (zoom === 'tenths') {
        min = 0; max = 1; tickCount = 10;
        // pick one of the 10 sub-ticks 0.1 .. 0.9 (avoid endpoints — trivial)
        const idx = rand(1, 9);
        target = idx / 10;
        displayDp = 1;
      } else {
        min = 0.3; max = 0.4; tickCount = 10;
        const idx = rand(1, 9);
        target = 0.3 + idx / 100;
        displayDp = 2;
      }
      // tolerance is ½ tick width in value units
      const tolerance = ((max - min) / tickCount) / 2;
      const targetStr = target.toFixed(displayDp);
      const template = i18n[lang]['numberline-tap'] || 'Tap where {target} goes';
      return {
        questionText: targetStr,
        subQuestion: template.replace('{target}', targetStr),
        answer: target,
        kind: 'numberline',
        zoom,
        min,
        max,
        tickCount,
        tolerance,
        answerKind: 'numberline'
      };
    }

    // Generator P2.3: metric measurement conversions. Six directions across
    // m / cm / mm. Generator picks values so the answer is a clean decimal
    // matching P1.4's ×10/÷10/×100/÷100/×1000/÷1000 mechanic.
    function genMeasurements() {
      // each entry = { from, to, factor }; factor is multiplier from→to
      const conversions = [
        { from: 'm',  to: 'cm', factor: 100 },
        { from: 'cm', to: 'm',  factor: 0.01 },
        { from: 'cm', to: 'mm', factor: 10 },
        { from: 'mm', to: 'cm', factor: 0.1 },
        { from: 'm',  to: 'mm', factor: 1000 },
        { from: 'mm', to: 'm',  factor: 0.001 }
      ];
      const c = conversions[rand(0, conversions.length - 1)];
      // Build a clean source value: integer for ×, decimal for ÷
      let value;
      if (c.factor >= 1) {
        // going to a smaller unit — pick a small decimal source like 1.5, 0.4, 7.3
        const wholeMax = c.factor === 1000 ? 9 : 99;
        const whole = rand(0, wholeMax);
        const tenth = rand(0, 9);
        value = parseFloat(`${whole}.${tenth}`);
        if (value === 0) value = 0.5;
      } else {
        // going to a bigger unit — pick a clean multiple of the inverse factor
        const inverse = Math.round(1 / c.factor); // 100 / 10 / 1000
        // value is a multiple of inverse so result is integer-ish
        const multiplier = rand(1, 12);
        // throw in a partial sometimes so answer is decimal (e.g. 30 mm = 3 cm; 45 mm = 4.5 cm)
        const partial = Math.random() < 0.4 ? rand(0, inverse - 1) : 0;
        value = multiplier * inverse + partial;
      }
      const answer = parseFloat((value * c.factor).toPrecision(12));
      const fromLabel = i18n[lang][`unit-${c.from}`] || c.from;
      const toLabel = i18n[lang][`unit-${c.to}`] || c.to;
      // Strip trailing zeros from value display
      const valueStr = (+value.toFixed(6)).toString();
      const template = i18n[lang]['measure-question'] || '{value} {from} = ? {to}';
      const questionText = template
        .replace('{value}', valueStr)
        .replace('{from}', fromLabel)
        .replace('{to}', toLabel);
      return {
        questionText,
        subQuestion: '',
        answer,
        kind: 'measure',
        from: c.from,
        to: c.to,
        answerKind: 'number'
      };
    }

    // Generator P3.1: percentages of whole numbers. Constrained so the answer
    // is always a whole number — kids learn the mechanic before fractions of
    // percent (that's P3.2). Percent ∈ {10, 20, 25, 50, 75, 100}.
    function genPercentages() {
      const percents = [10, 20, 25, 50, 75, 100];
      const p = percents[rand(0, percents.length - 1)];
      // Pick base values that keep the answer whole.
      // 10%, 20%, 50%, 100% → any multiple of 10
      // 25% → multiple of 4 (and we use multiples of 20 for clean kid-math)
      // 75% → multiple of 4 (we use multiples of 20)
      let base;
      if (p === 25 || p === 75) {
        const k = rand(1, 10); // 20, 40, ..., 200
        base = k * 20;
      } else {
        const k = rand(1, 20); // 10, 20, ..., 200
        base = k * 10;
      }
      const answer = (base * p) / 100;
      const template = i18n[lang]['percent-question'] || 'What is {p}% of {n}?';
      const questionText = template.replace('{p}', p).replace('{n}', base);
      return {
        questionText,
        subQuestion: '',
        answer,
        kind: 'percent',
        percent: p,
        base,
        answerKind: 'number'
      };
    }

    function nextDecimalQuestion() {
      let q;
      if (dState.activeModule === 'p1-2') {
        q = genCompare();
      } else if (dState.activeModule === 'p1-3') {
        q = genAddSub();
      } else if (dState.activeModule === 'p1-4') {
        q = genMulDivPow10();
      } else if (dState.activeModule === 'p2-1') {
        q = genDecimalFractions();
        // P2.1's answerKind varies per question — sync the UI
        if (q.answerKind && q.answerKind !== dState.answerKind) {
          dState.answerKind = q.answerKind;
          applyDrillUI();
        }
      } else if (dState.activeModule === 'p2-2') {
        q = genNumberLine();
      } else if (dState.activeModule === 'p2-3') {
        q = genMeasurements();
      } else if (dState.activeModule === 'p3-1') {
        q = genPercentages();
      } else if (dState.submode === 'mixed-dec') {
        q = Math.random() < 0.5 ? genPlaceValue() : genUnitConv();
      } else if (dState.submode === 'unit-conv') {
        q = genUnitConv();
      } else {
        q = genPlaceValue();
      }
      dState.current = q;
      const qEl = document.getElementById('d-question');
      const subEl = document.getElementById('d-subquestion');
      if (q.kind === 'addsub') {
        // School-style vertical column layout — decimal points aligned via
        // tabular-nums + right-align (no monospace needed).
        // The CSS grid: operator-col + digits-col + divider row spanning both.
        const opColor = q.op === '+' ? '#059669' /* emerald */ : '#dc2626' /* red */;
        qEl.innerHTML =
          `<div style="display: inline-grid; grid-template-columns: auto auto; ` +
          `gap: 0.15em 0.5em; font-size: 4rem; font-weight: 900; line-height: 1.05; ` +
          `font-variant-numeric: tabular-nums;">` +
          `<span></span><span style="text-align: right;">${q.aDisplay}</span>` +
          `<span style="color: ${opColor};">${q.op}</span>` +
          `<span style="text-align: right;">${q.bDisplay}</span>` +
          `<span style="grid-column: 1 / span 2; border-top: 5px solid #1e293b; ` +
          `margin-top: 0.1em;"></span>` +
          `</div>`;
      } else if (q.kind === 'numberline') {
        // The big question label is the target value; the line+ticks live in
        // the answer row. Sub-question reads "tap where X goes".
        qEl.textContent = q.questionText;
        renderNumberLine(q);
      } else {
        qEl.textContent = q.questionText;
      }
      subEl.textContent = q.subQuestion;
      qEl.classList.add('pop');
      setTimeout(() => qEl.classList.remove('pop'), 300);
      const input = document.getElementById('d-answer');
      if (input) input.value = '';
      document.getElementById('d-numerator').value = '';
      document.getElementById('d-denominator').value = '';
      if (dState.answerKind === 'number' && input) input.focus();
      if (dState.answerKind === 'fraction') document.getElementById('d-numerator').focus();
      document.getElementById('d-feedback').textContent = '';
    }

    function selectDecimalMode(el) {
      document.querySelectorAll('.decimal-mode-btn').forEach(x => {
        x.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        x.classList.add('bg-indigo-50');
      });
      el.classList.remove('bg-indigo-50');
      el.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
      dState.submode = el.dataset.decimalMode;
      nextDecimalQuestion();
    }
    document.querySelectorAll('.decimal-mode-btn').forEach(b =>
      b.addEventListener('click', () => selectDecimalMode(b))
    );

    function applyDrillUI() {
      // toggle which input UI is showing
      document.getElementById('d-number-row').classList.toggle('hidden', dState.answerKind !== 'number');
      document.getElementById('d-choice-row').classList.toggle('hidden', dState.answerKind !== 'choice');
      document.getElementById('d-fraction-row').classList.toggle('hidden', dState.answerKind !== 'fraction');
      document.getElementById('d-numberline-row').classList.toggle('hidden', dState.answerKind !== 'numberline');
      // show sub-mode toggle only for modules that have sub-modes (P1.1)
      document.getElementById('d-submode-row').classList.toggle('hidden', dState.activeModule !== 'p1-1');
      if (typeof updateNumpadVisibility === 'function') updateNumpadVisibility();
    }

    // ---------- number line (P2.2) rendering + tap handling ----------
    // SVG coords: x=20 (min) → x=380 (max). 360px line, tickCount ticks.
    const NL_X0 = 20, NL_X1 = 380, NL_WIDTH = NL_X1 - NL_X0;

    function nlValueToX(value, min, max) {
      return NL_X0 + ((value - min) / (max - min)) * NL_WIDTH;
    }

    function nlXToValue(x, min, max) {
      const clamped = Math.max(NL_X0, Math.min(NL_X1, x));
      return min + ((clamped - NL_X0) / NL_WIDTH) * (max - min);
    }

    function renderNumberLine(q) {
      const ticksG = document.getElementById('d-numberline-ticks');
      ticksG.innerHTML = '';
      const ns = 'http://www.w3.org/2000/svg';
      const labelDp = q.zoom === 'tenths' ? 1 : 2;
      for (let i = 0; i <= q.tickCount; i++) {
        const v = q.min + (i * (q.max - q.min)) / q.tickCount;
        const x = nlValueToX(v, q.min, q.max);
        const isMajor = (i === 0 || i === q.tickCount);
        const tick = document.createElementNS(ns, 'line');
        tick.setAttribute('x1', x);
        tick.setAttribute('x2', x);
        tick.setAttribute('y1', isMajor ? 45 : 52);
        tick.setAttribute('y2', isMajor ? 75 : 68);
        tick.setAttribute('stroke', '#1e293b');
        tick.setAttribute('stroke-width', isMajor ? 3 : 2);
        tick.setAttribute('stroke-linecap', 'round');
        ticksG.appendChild(tick);
        if (isMajor) {
          const label = document.createElementNS(ns, 'text');
          label.setAttribute('x', x);
          label.setAttribute('y', 95);
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('font-size', 14);
          label.setAttribute('font-weight', 700);
          label.setAttribute('fill', '#475569');
          label.textContent = (+v.toFixed(labelDp)).toString();
          ticksG.appendChild(label);
        }
      }
      document.getElementById('d-numberline-marker').classList.add('hidden');
    }

    function handleNumberLineTap(evt) {
      if (dState.current == null || dState.current.kind !== 'numberline') return;
      const svg = document.getElementById('d-numberline-svg');
      const pt = svg.createSVGPoint();
      const touch = evt.touches && evt.touches[0];
      pt.x = touch ? touch.clientX : evt.clientX;
      pt.y = touch ? touch.clientY : evt.clientY;
      const ctm = svg.getScreenCTM();
      if (!ctm) return;
      const local = pt.matrixTransform(ctm.inverse());
      const q = dState.current;
      const tappedValue = nlXToValue(local.x, q.min, q.max);
      const correct = Math.abs(tappedValue - q.answer) <= q.tolerance;
      // Show visual feedback markers
      const correctMark = document.getElementById('d-numberline-mark-correct');
      const tappedMark = document.getElementById('d-numberline-mark-tapped');
      correctMark.setAttribute('cx', nlValueToX(q.answer, q.min, q.max));
      tappedMark.setAttribute('cx', nlValueToX(tappedValue, q.min, q.max));
      tappedMark.setAttribute('fill', correct ? '#16a34a' : '#dc2626');
      document.getElementById('d-numberline-marker').classList.remove('hidden');
      processDecimalOutcome(correct);
    }

    document.getElementById('d-numberline-svg').addEventListener('click', handleNumberLineTap);
    document.getElementById('d-numberline-svg').addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleNumberLineTap(e);
    }, { passive: false });

    function resetDrillScores() {
      dState.score = 0;
      dState.streak = 0;
      dState.best = parseInt(localStorage.getItem(dBestKey()) || '0', 10);
      document.getElementById('d-score').textContent = '0';
      document.getElementById('d-streak').textContent = '0';
      document.getElementById('d-streak-emoji').textContent = '🔥';
    }

    function setAnswerInputMode(mode) {
      const input = document.getElementById('d-answer');
      input.setAttribute('inputmode', mode);
      if (mode === 'decimal') input.setAttribute('step', '0.01');
      else input.removeAttribute('step');
    }

    function enterDecimalDrill() {
      dState.activeModule = 'p1-1';
      dState.answerKind = 'number';
      setAnswerInputMode('numeric');
      resetDrillScores();
      applyDrillUI();
      // default to place-value submode visually
      selectDecimalMode(document.querySelector('[data-decimal-mode="place-value"]'));
      showScreen('decimal-drill');
    }

    function enterCompareDecimals() {
      dState.activeModule = 'p1-2';
      dState.answerKind = 'choice';
      setAnswerInputMode('numeric');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterAddSubDecimals() {
      dState.activeModule = 'p1-3';
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterMulDivPow10() {
      dState.activeModule = 'p1-4';
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterDecimalFractions() {
      dState.activeModule = 'p2-1';
      // P2.1 alternates per-question; the generator updates dState.answerKind
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterNumberLine() {
      dState.activeModule = 'p2-2';
      dState.answerKind = 'numberline';
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterMeasurements() {
      dState.activeModule = 'p2-3';
      dState.answerKind = 'number';
      setAnswerInputMode('decimal');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function enterPercentages() {
      dState.activeModule = 'p3-1';
      dState.answerKind = 'number';
      setAnswerInputMode('numeric');
      resetDrillScores();
      applyDrillUI();
      showScreen('decimal-drill');
      nextDecimalQuestion();
    }

    function processDecimalOutcome(isCorrect) {
      const qEl = document.getElementById('d-question');
      const fb = document.getElementById('d-feedback');
      if (isCorrect) {
        playCorrect();
        dState.score++;
        dState.streak++;
        if (dState.streak > dState.best) {
          dState.best = dState.streak;
          localStorage.setItem(dBestKey(), dState.best);
        }
        document.getElementById('d-score').textContent = dState.score;
        document.getElementById('d-streak').textContent = dState.streak;
        document.getElementById('d-streak-emoji').textContent = streakEmoji(dState.streak);
        qEl.classList.add('flash-correct');
        let msg = i18n[lang].correct;
        if (dState.streak === 5) msg = i18n[lang].great + ' ' + i18n[lang].correct;
        if (dState.streak === 10) msg = i18n[lang].fire + ' ' + i18n[lang].correct;
        if (dState.streak === 20) msg = i18n[lang].amazing + ' ' + i18n[lang].correct;
        fb.textContent = msg;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-green-600';
        setTimeout(() => {
          qEl.classList.remove('flash-correct');
          nextDecimalQuestion();
        }, 700);
      } else {
        playWrong();
        dState.streak = 0;
        document.getElementById('d-streak').textContent = '0';
        document.getElementById('d-streak-emoji').textContent = '🔥';
        qEl.classList.add('flash-wrong');
        const expected = dState.current.kind === 'dec-to-frac'
          ? `${dState.current.answerNumerator}/${dState.current.answerDenominator}`
          : dState.current.answer;
        fb.textContent = `${i18n[lang].wrong} ${expected}`;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-red-600';
        setTimeout(() => {
          qEl.classList.remove('flash-wrong');
          nextDecimalQuestion();
        }, 1600);
      }
    }

    function submitFraction() {
      if (dState.current == null) return;
      const numStr = document.getElementById('d-numerator').value.trim();
      const denStr = document.getElementById('d-denominator').value.trim();
      if (numStr === '' || denStr === '') return;
      const num = parseInt(numStr, 10);
      const den = parseInt(denStr, 10);
      if (isNaN(num) || isNaN(den) || den === 0) return;
      // Cross-multiply equivalence: 30/100 == 3/10 because 30*10 == 100*3
      const correct = num * dState.current.answerDenominator === den * dState.current.answerNumerator;
      processDecimalOutcome(correct);
    }

    function submitDecimal() {
      if (dState.current == null) return;
      if (dState.current.kind === 'dec-to-frac') {
        submitFraction();
        return;
      }
      const raw = document.getElementById('d-answer').value.trim();
      if (raw === '') return;
      const v = parseFloat(raw);
      if (isNaN(v)) return;
      // Float-tolerant: accepts "1.95" and "1.950" equivalently; harmless for int modes
      const correct = Math.abs(v - dState.current.answer) < 0.005;
      processDecimalOutcome(correct);
    }

    document.getElementById('d-submit-btn').addEventListener('click', submitDecimal);
    document.getElementById('d-answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitDecimal();
    });
    document.getElementById('d-fraction-submit-btn').addEventListener('click', submitFraction);
    ['d-numerator', 'd-denominator'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') submitFraction();
      });
    });
    document.querySelectorAll('.d-choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (dState.current == null) return;
        const v = parseInt(btn.dataset.choice, 10);
        // reuse the same correct/wrong path as submitDecimal by stashing the value
        const fakeInput = { value: String(v) };
        const realInput = document.getElementById('d-answer');
        realInput.value = String(v);
        submitDecimal();
      });
    });
    document.getElementById('d-back-btn').addEventListener('click', () => {
      showScreen('decimals-menu');
    });

    // ---------- testability surface ----------
    // Exposes pure generator functions for tests.html. Not used by the app
    // itself. Adds zero kilobytes to network when devtools is closed; safe
    // for prod. Tests assert on these directly without touching the DOM.
    window.__kaflon = {
      gen: {
        placeValue: genPlaceValue,
        unitConv: genUnitConv,
        compare: genCompare,
        numberLine: genNumberLine,
        measurements: genMeasurements,
        percentages: genPercentages
      },
      rand,
      PLACES,
      DECIMAL_MODULES
    };

    // ---------- boot ----------
    applyLang();
    routeProfile();
  </script>
</body>
</html>
