<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>Kaflon · כפלון — multiplication & division practice</title>
  <link rel="canonical" href="https://kaflon.opsagents.agency/">
  <meta name="description" content="Free open-source multiplication & division practice for kids. Built with Claude Code.">
  <meta property="og:title" content="Kaflon · כפלון">
  <meta property="og:description" content="Free open-source multiplication & division practice for kids.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%96%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
    body { font-family: 'Inter', 'Heebo', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    [dir="rtl"] { font-family: 'Heebo', 'Inter', system-ui, sans-serif; }
    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .answer-input { -moz-appearance: textfield; }
    @keyframes flash-correct { 0% { background-color: rgb(34 197 94); color: white; transform: scale(1.05); } 100% { background-color: transparent; transform: scale(1); } }
    @keyframes flash-wrong { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .flash-correct { animation: flash-correct 0.7s ease-out; }
    .flash-wrong { animation: flash-wrong 0.4s ease-in-out; background-color: rgb(254 226 226); }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop { animation: pop 0.3s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 flex flex-col items-center p-4 pt-8">

  <div id="app" class="w-full max-w-md">

    <header class="flex items-center justify-between mb-6">
      <h1 class="text-4xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
        Kaflon
      </h1>
      <button id="lang-toggle" class="px-4 py-2 bg-white rounded-full shadow-md text-sm font-bold hover:shadow-lg active:scale-95 transition">
        עברית
      </button>
    </header>

    <!-- SETTINGS -->
    <section id="settings" class="bg-white rounded-3xl shadow-xl p-6 space-y-6">

      <div>
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="mode">Mode</label>
        <div class="grid grid-cols-3 gap-2">
          <button data-mode="multiply" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition">×</button>
          <button data-mode="divide" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-3xl active:scale-95 transition">÷</button>
          <button data-mode="mixed" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-2xl active:scale-95 transition">×÷</button>
          <button data-mode="squares" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-2xl active:scale-95 transition" aria-label="Squares" title="Squares (n × n)">n²</button>
          <button data-mode="doubles" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-xl active:scale-95 transition" aria-label="Doubles" title="Doubles (n × 2)">×2</button>
          <button data-mode="halves" class="mode-btn px-3 py-4 rounded-2xl bg-indigo-50 font-black text-xl active:scale-95 transition" aria-label="Halves" title="Halves (2n ÷ 2)">÷2</button>
        </div>
      </div>

      <div id="diff-section">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="difficulty">Difficulty</label>
        <div class="grid grid-cols-2 gap-2">
          <button data-diff="single" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="single-table">Single table</button>
          <button data-diff="random" class="diff-btn px-3 py-3 rounded-2xl bg-purple-50 font-bold active:scale-95 transition" data-i18n="random">Random</button>
        </div>
      </div>

      <div id="table-picker" class="hidden">
        <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider" data-i18n="pick-table">Pick a table</label>
        <div id="table-picker-grid" class="grid grid-cols-5 gap-2"></div>
      </div>

      <button id="start-btn" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 hover:shadow-xl transition" data-i18n="start">
        Start! 🚀
      </button>
    </section>

    <!-- GAME -->
    <section id="game" class="hidden bg-white rounded-3xl shadow-xl p-6 space-y-5">

      <div class="flex justify-between text-base">
        <div class="bg-indigo-50 rounded-full px-4 py-2">
          <span data-i18n="score">Score</span>: <span id="score" class="font-black text-indigo-600">0</span>
        </div>
        <div class="bg-orange-50 rounded-full px-4 py-2">
          <span data-i18n="streak">Streak</span>: <span id="streak" class="font-black text-orange-600">0</span> <span id="streak-emoji">🔥</span>
        </div>
      </div>

      <div id="question" class="text-7xl sm:text-8xl font-black text-center py-10 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl select-none">
        7 × 8
      </div>

      <input
        id="answer"
        type="number"
        inputmode="numeric"
        autocomplete="off"
        class="answer-input w-full text-5xl text-center py-5 border-4 border-indigo-200 rounded-2xl focus:border-indigo-500 outline-none font-black"
        placeholder="?"
      >

      <div class="grid grid-cols-4 gap-2">
        <button id="submit-btn" class="col-span-3 py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-lg shadow-md active:scale-95 transition" data-i18n="check">
          Check ✓
        </button>
        <button id="back-btn" class="py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-2xl active:scale-95 transition" aria-label="Settings">
          ⚙
        </button>
      </div>

      <div id="feedback" class="text-center font-bold text-lg min-h-[28px]"></div>
    </section>

    <footer class="text-center text-xs text-slate-500 mt-8 space-y-1">
      <p>
        <a href="https://github.com/OpsAgentsAI/kaflon" class="underline hover:text-indigo-600">GitHub</a>
        ·
        <span data-i18n="built-with">Built with Claude Code</span>
        ·
        <span data-i18n="free-oss">Free &amp; open source</span>
      </p>
      <p class="text-slate-400">
        <a href="https://msapps.mobi" class="hover:text-indigo-600">MSApps</a> ·
        <a href="https://opsagents.agency" class="hover:text-indigo-600">OpsAgents</a>
      </p>
    </footer>
  </div>

  <script>
    // ---------- i18n ----------
    const i18n = {
      en: {
        mode: 'Mode',
        difficulty: 'Difficulty',
        'single-table': 'Single table',
        random: 'Random',
        'pick-table': 'Pick a table',
        start: 'Start! 🚀',
        score: 'Score',
        streak: 'Streak',
        check: 'Check ✓',
        'built-with': 'Built with Claude Code',
        'free-oss': 'Free & open source',
        correct: 'Correct! 🎉',
        wrong: 'Almost! The answer is',
        great: 'Great streak!',
        amazing: 'Amazing!',
        fire: 'On fire!'
      },
      he: {
        mode: 'מצב',
        difficulty: 'רמת קושי',
        'single-table': 'לוח אחד',
        random: 'אקראי',
        'pick-table': 'בחרי לוח',
        start: 'מתחילים! 🚀',
        score: 'ניקוד',
        streak: 'רצף',
        check: 'בדיקה ✓',
        'built-with': 'נבנה עם Claude Code',
        'free-oss': 'חינמי וקוד פתוח',
        correct: 'נכון! 🎉',
        wrong: 'כמעט! התשובה היא',
        great: 'רצף יפה!',
        amazing: 'מדהים!',
        fire: 'בוערים!'
      }
    };

    let lang = localStorage.getItem('kaflon-lang') || (navigator.language?.startsWith('he') ? 'he' : 'en');

    function applyLang() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'en' ? 'עברית' : 'English';
      localStorage.setItem('kaflon-lang', lang);
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'en' ? 'he' : 'en';
      applyLang();
    });

    // ---------- state ----------
    const state = {
      mode: 'multiply',
      diff: 'random',
      table: 5,
      score: 0,
      streak: 0,
      best: parseInt(localStorage.getItem('kaflon-best') || '0', 10),
      current: null
    };

    // ---------- mode buttons ----------
    const DRILL_MODES = new Set(['squares', 'doubles', 'halves']);
    function isDrillMode(m) { return DRILL_MODES.has(m); }

    function selectMode(el) {
      document.querySelectorAll('.mode-btn').forEach(x => {
        x.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        x.classList.add('bg-indigo-50');
      });
      el.classList.remove('bg-indigo-50');
      el.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
      state.mode = el.dataset.mode;
      // Drill modes have a fixed shape — hide difficulty + table picker.
      const drill = isDrillMode(state.mode);
      document.getElementById('diff-section').classList.toggle('hidden', drill);
      if (drill) document.getElementById('table-picker').classList.add('hidden');
      else if (state.diff === 'single') document.getElementById('table-picker').classList.remove('hidden');
    }
    document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => selectMode(b)));
    selectMode(document.querySelector('[data-mode="multiply"]'));

    // ---------- difficulty buttons ----------
    function selectDiff(el) {
      document.querySelectorAll('.diff-btn').forEach(x => {
        x.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
        x.classList.add('bg-purple-50');
      });
      el.classList.remove('bg-purple-50');
      el.classList.add('bg-purple-600', 'text-white', 'shadow-md');
      state.diff = el.dataset.diff;
      document.getElementById('table-picker').classList.toggle('hidden', el.dataset.diff !== 'single');
    }
    document.querySelectorAll('.diff-btn').forEach(b => b.addEventListener('click', () => selectDiff(b)));
    selectDiff(document.querySelector('[data-diff="random"]'));

    // ---------- table picker ----------
    const tableGrid = document.getElementById('table-picker-grid');
    for (let i = 2; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = 'table-btn py-3 rounded-xl bg-purple-100 font-bold text-lg active:scale-95 transition';
      btn.addEventListener('click', () => {
        document.querySelectorAll('.table-btn').forEach(x => {
          x.classList.remove('bg-purple-600', 'text-white');
          x.classList.add('bg-purple-100');
        });
        btn.classList.remove('bg-purple-100');
        btn.classList.add('bg-purple-600', 'text-white');
        state.table = i;
      });
      tableGrid.appendChild(btn);
      if (i === 5) btn.click();
    }

    // ---------- question generator ----------
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function nextQuestion() {
      let questionText, answer;

      if (state.mode === 'squares') {
        const n = rand(2, 10);
        questionText = `${n} × ${n}`;
        answer = n * n;
      } else if (state.mode === 'doubles') {
        const n = rand(1, 10);
        questionText = `${n} × 2`;
        answer = n * 2;
      } else if (state.mode === 'halves') {
        const n = rand(1, 10);
        questionText = `${n * 2} ÷ 2`;
        answer = n;
      } else {
        let op;
        if (state.mode === 'mixed') op = Math.random() < 0.5 ? '×' : '÷';
        else op = state.mode === 'multiply' ? '×' : '÷';

        let a, b;
        if (state.diff === 'single') {
          a = state.table;
          b = rand(1, 10);
        } else {
          a = rand(1, 10);
          b = rand(1, 10);
        }

        if (op === '×') {
          questionText = `${a} × ${b}`;
          answer = a * b;
        } else {
          // division: present (a*b) ÷ b = a so answers are always whole numbers
          questionText = `${a * b} ÷ ${b}`;
          answer = a;
        }
      }

      state.current = { questionText, answer };
      const q = document.getElementById('question');
      q.textContent = questionText;
      q.classList.add('pop');
      setTimeout(() => q.classList.remove('pop'), 300);

      const input = document.getElementById('answer');
      input.value = '';
      input.focus();
      document.getElementById('feedback').textContent = '';
    }

    // ---------- start ----------
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('settings').classList.add('hidden');
      document.getElementById('game').classList.remove('hidden');
      state.score = 0;
      state.streak = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '0';
      document.getElementById('streak-emoji').textContent = '🔥';
      nextQuestion();
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('game').classList.add('hidden');
      document.getElementById('settings').classList.remove('hidden');
    });

    // ---------- submit ----------
    function streakEmoji(s) {
      if (s >= 20) return '🚀';
      if (s >= 10) return '⚡';
      if (s >= 5) return '🔥';
      return '✨';
    }

    function submit() {
      const v = parseInt(document.getElementById('answer').value, 10);
      if (isNaN(v)) return;
      const q = document.getElementById('question');
      const fb = document.getElementById('feedback');

      if (v === state.current.answer) {
        state.score++;
        state.streak++;
        if (state.streak > state.best) {
          state.best = state.streak;
          localStorage.setItem('kaflon-best', state.best);
        }
        document.getElementById('score').textContent = state.score;
        document.getElementById('streak').textContent = state.streak;
        document.getElementById('streak-emoji').textContent = streakEmoji(state.streak);
        q.classList.add('flash-correct');
        let msg = i18n[lang].correct;
        if (state.streak === 5) msg = i18n[lang].great + ' ' + i18n[lang].correct;
        if (state.streak === 10) msg = i18n[lang].fire + ' ' + i18n[lang].correct;
        if (state.streak === 20) msg = i18n[lang].amazing + ' ' + i18n[lang].correct;
        fb.textContent = msg;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-green-600';
        setTimeout(() => {
          q.classList.remove('flash-correct');
          nextQuestion();
        }, 700);
      } else {
        state.streak = 0;
        document.getElementById('streak').textContent = '0';
        document.getElementById('streak-emoji').textContent = '🔥';
        q.classList.add('flash-wrong');
        fb.textContent = `${i18n[lang].wrong} ${state.current.answer}`;
        fb.className = 'text-center font-bold text-lg min-h-[28px] text-red-600';
        setTimeout(() => {
          q.classList.remove('flash-wrong');
          nextQuestion();
        }, 1600);
      }
    }

    document.getElementById('submit-btn').addEventListener('click', submit);
    document.getElementById('answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });

    // ---------- boot ----------
    applyLang();
  </script>
</body>
</html>
